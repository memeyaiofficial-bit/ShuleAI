    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    let answerLocked = false;
    let autoNextTimer = null;
    let recognition = null;
    let totalQuestionsForGrade = 0;

    const quizMain = document.getElementById('quizMain');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = currentScore;
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function selectGrade(grade) {
        if (autoNextTimer) clearTimeout(autoNextTimer);
        if (recognition) recognition.abort();
        currentGrade = grade;
        const gradeData = gradeQuestions[grade];
        if (gradeData) {
            currentQuestions = [...gradeData.questions];
            totalQuestionsForGrade = currentQuestions.length;
            gradeInfoArea.innerHTML = `🎤 ${gradeData.name}: ${gradeData.description} | ${totalQuestionsForGrade} questions`;
        } else {
            currentQuestions = [];
            totalQuestionsForGrade = 0;
            gradeInfoArea.innerHTML = `🎤 ${grade}: Ready to speak and listen!`;
        }
        
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        updateTotalScoreUI();
        renderGradeButtons();
        renderCurrentQuestion();
    }

    function speakText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    function checkAnswerAndAward(spokenText) {
        if (answerLocked) return false;
        const currentQ = currentQuestions[currentQuestionIndex];
        const expected = currentQ.expected.toLowerCase();
        const spoken = spokenText.trim().toLowerCase().replace(/[^\w\s]/g, '');
        
        let isMatch = (spoken === expected);
        if (!isMatch && (spoken.includes(expected) || expected.includes(spoken))) {
            if (Math.abs(spoken.length - expected.length) <= 3) isMatch = true;
        }
        // Also check for common variations
        const expectedWords = expected.split(' ');
        const spokenWords = spoken.split(' ');
        if (!isMatch && expectedWords.length > 1 && spokenWords.length > 1) {
            let matchCount = 0;
            for (let ew of expectedWords) {
                if (spokenWords.some(sw => sw === ew || sw.includes(ew) || ew.includes(sw))) matchCount++;
            }
            if (matchCount >= expectedWords.length * 0.7) isMatch = true;
        }
        
        if (isMatch) {
            answerLocked = true;
            currentScore = Math.min(currentScore + 1, currentQuestions.length);
            updateTotalScoreUI();
            renderCurrentQuestion(true);
            if (autoNextTimer) clearTimeout(autoNextTimer);
            autoNextTimer = setTimeout(() => {
                if (answerLocked) {
                    moveToNextQuestion();
                }
            }, 2300);
            return true;
        }
        return false;
    }

    function startListening() {
        if (answerLocked) {
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '✅ Already answered! Moving to next word.';
                statusDiv.className = 'status good-status';
            }
            return;
        }
        if (!recognitionSupported) {
            alert("Speech recognition not supported. Please use Chrome or Edge browser.");
            return;
        }
        if (recognition) recognition.abort();
        recognition = new SpeechRecognitionAPI();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        
        recognition.onstart = () => {
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.add('listening');
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '🎙️ Listening... Say your answer clearly!';
                statusDiv.className = 'status warning-status';
            }
        };
        
        recognition.onerror = (event) => {
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('listening');
            let errorMsg = '⚠️ Could not hear you. Click microphone and speak clearly.';
            if (event.error === 'no-speech') errorMsg = '🔇 No speech detected. Click microphone and speak.';
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = errorMsg;
                statusDiv.className = 'status bad-status';
            }
            recognition = null;
        };
        
        recognition.onend = () => {
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('listening');
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = `🗣️ You said: "${transcript}"`;
                statusDiv.className = 'status warning-status';
            }
            const isCorrect = checkAnswerAndAward(transcript);
            if (!isCorrect && !answerLocked) {
                if (statusDiv) {
                    statusDiv.innerHTML = `❌ "${transcript}" is not correct. Try again!`;
                    statusDiv.className = 'status bad-status';
                }
                setTimeout(() => {
                    if (!answerLocked && statusDiv && statusDiv.innerHTML.includes('not correct')) {
                        statusDiv.innerHTML = 'Click microphone and speak the correct answer';
                        statusDiv.className = 'status warning-status';
                    }
                }, 2500);
            }
            recognition = null;
        };
        
        recognition.start();
    }

    function moveToNextQuestion() {
        if (!answerLocked) return;
        if (currentQuestionIndex + 1 < currentQuestions.length) {
            currentQuestionIndex++;
            answerLocked = false;
            renderCurrentQuestion();
        } else {
            renderCompletionScreen();
        }
    }

    function resetLevel() {
        if (autoNextTimer) clearTimeout(autoNextTimer);
        if (recognition) recognition.abort();
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        updateTotalScoreUI();
        renderCurrentQuestion();
    }

    function renderCompletionScreen() {
        const totalQ = currentQuestions.length;
        const percentage = Math.round((currentScore / totalQ) * 100);
        let message = "";
        if (percentage >= 80) message = "🌟 Excellent! You're a Speaking Champion! 🌟";
        else if (percentage >= 60) message = "👍 Good job! Keep practicing your pronunciation!";
        else message = "📘 Keep trying! Speak clearly and try again!";
        
        quizMain.innerHTML = `
            <div class="quiz-complete">
                <h2>🎉 ${currentGrade} Speaking Complete! 🎉</h2>
                <p style="font-size:1.5rem; margin: 1rem 0;">📊 Your Score: ${currentScore} / ${totalQ}</p>
                <p style="font-size:1rem;">${percentage}% - ${message}</p>
                <button id="resetGradeBtn" class="next-btn" style="background:#ffcd3c; margin-top:1rem;">🔄 Play Again</button>
                <button id="changeGradeBtn" class="next-btn" style="background:#e0e0e0; box-shadow:0 6px 0 #aaa;">📚 Change Grade</button>
            </div>
        `;
        document.getElementById('resetGradeBtn')?.addEventListener('click', () => resetLevel());
        document.getElementById('changeGradeBtn')?.addEventListener('click', () => {
            document.querySelector('.grade-selector-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderCurrentQuestion(isCorrectJustAwarded = false) {
        if (!currentQuestions.length || currentQuestionIndex >= currentQuestions.length) {
            if (currentQuestions.length > 0 && currentQuestionIndex >= currentQuestions.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="quiz-complete"><h2>🎤 Select a grade to start speaking!</h2><p>Choose your grade from the buttons above.</p></div>`;
            }
            return;
        }
        
        const q = currentQuestions[currentQuestionIndex];
        const promptText = q.prompt;
        const hintText = q.hint || "Say your answer clearly into the microphone.";
        const isAnswered = answerLocked;
        
        let statusHtml = '';
        let successMessageHtml = '';
        
        if (isCorrectJustAwarded) {
            successMessageHtml = `
                <div class="success-message" style="animation: fadeInScale 0.4s ease-out;">
                    🎉✨ GREAT JOB! +1 POINT! ✨🎉<br>
                    Your answer was correct!
                </div>
            `;
            statusHtml = '<div id="dynamicStatus" class="status good-status">✅ Moving to next question... ✅</div>';
        } else if (isAnswered) {
            statusHtml = '<div class="status good-status">✅ Already answered! Moving to next...</div>';
        } else {
            statusHtml = '<div id="dynamicStatus" class="status warning-status">Click microphone and speak your answer clearly</div>';
        }
        
        quizMain.innerHTML = `
            <div class="progress-area">
                <div class="q-counter">🎧 Question ${currentQuestionIndex+1} / ${currentQuestions.length}  |  ${currentGrade} Level</div>
            </div>
            <div class="question-card">
                <div class="hint-text">💡 Hint: ${hintText}</div>
                <div class="question-text">🎤 ${promptText}</div>
                <div class="voice-controls">
                    <button id="listenBtn" class="listen-btn" ${isAnswered ? 'disabled' : ''}>🔊 LISTEN TO PROMPT</button>
                    <button id="micBtn" class="microphone-btn" ${isAnswered ? 'disabled' : ''}>🎙️ ${isAnswered ? 'ANSWERED' : 'SPEAK ANSWER'}</button>
                </div>
                ${successMessageHtml}
                ${statusHtml}
            </div>
        `;
        
        const listenBtn = document.getElementById('listenBtn');
        if (listenBtn) listenBtn.addEventListener('click', () => speakText(promptText));
        
        const micBtn = document.getElementById('micBtn');
        if (micBtn && !isAnswered) micBtn.addEventListener('click', startListening);
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
    }

    initGame();
</script>
</body>
</html>
