    function shuffleAnswers(questionObj) {
        const optionsWithMeta = questionObj.options.map((optText, idx) => ({
            text: optText,
            isCorrect: (idx === questionObj.correct)
        }));
        for (let i = optionsWithMeta.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
        }
        const shuffledOptions = [];
        let newCorrectIndex = -1;
        optionsWithMeta.forEach((item, newIdx) => {
            shuffledOptions.push(item.text);
            if (item.isCorrect) newCorrectIndex = newIdx;
        });
        return {
            text: questionObj.text,
            hint: questionObj.hint,
            options: shuffledOptions,
            correct: newCorrectIndex
        };
    }

                { text: "What does 'COO' stand for?", hint: "Chief Operating Officer", options: ["Chief Operating Officer", "Chief Office Operator", "Central Operations Office", "Corporate Order Officer"], correct: 0 },
                { text: "What does 'ROI' mean in a business conversation?", hint: "Return on Investment", options: ["Return on Investment", "Rate of Interest", "Range of Income", "Rule of Information"], correct: 0 },
                { text: "What does 'CRM' stand for in customer service?", hint: "Customer Relationship Management", options: ["Customer Relationship Management", "Customer Record Maintenance", "Call Response Management", "Client Relations Method"], correct: 0 },
                { text: "What does 'KPI' mean in a performance call?", hint: "Key Performance Indicator", options: ["Key Performance Indicator", "Key Process Instruction", "Knowledge Performance Index", "Keep Performance Information"], correct: 0 },
                { text: "What does 'UX' stand for in design calls?", hint: "User Experience", options: ["User Experience", "Universal X-ray", "Under Xylophone", "Ultra Xtreme"], correct: 0 },
                { text: "What does 'POV' mean in a discussion?", hint: "Point of View", options: ["Point of View", "Power of Voice", "Proof of Value", "Promise of Victory"], correct: 0 },
                { text: "What does 'R&D' mean in a corporate call?", hint: "Research and Development", options: ["Research and Development", "Rules and Regulations", "Repair and Design", "Review and Debate"], correct: 0 },
                { text: "What does 'SOP' stand for in a process call?", hint: "Standard Operating Procedure", options: ["Standard Operating Procedure", "Source of Power", "Start of Production", "System of Protocols"], correct: 0 },
                { text: "What does 'B2B' mean in a sales call?", hint: "Business to Business", options: ["Business to Business", "Back to Basics", "Buy to Bill", "Bidirectional Business"], correct: 0 },
                { text: "What does 'B2C' stand for?", hint: "Business to Consumer", options: ["Business to Consumer", "Back to Customer", "Buy to Consume", "Bidirectional Communication"], correct: 0 }
            ]
        },
        "Grade 8": {
            name: "Grade 8",
            description: "Professional telephone etiquette and business writing",
            questions: [
                { text: "What is the best way to begin a professional phone call?", hint: "Greeting and introduction", options: ["Good morning, this is [Your Name] from [Company]. How may I help you?", "Hello?", "Hi, what do you want?", "Yo, who's this?"], correct: 0 },
                { text: "When leaving a voicemail, what key information should you include?", hint: "Name, number, reason, time", options: ["Your name, phone number, reason for calling, and best time to return the call", "Only your name", "Only your number", "Only the reason"], correct: 0 },
                { text: "What is 'active listening' on a phone call?", hint: "Showing engagement", options: ["Showing you are engaged by summarizing and asking clarifying questions", "Talking over the other person", "Being silent", "Multitasking"], correct: 0 },
                { text: "What does 'CC' mean in an email referenced during a call?", hint: "Carbon Copy", options: ["Carbon Copy", "Courtesy Copy", "Core Copy", "Central Copy"], correct: 0 },
                { text: "What does 'BCC' mean in email etiquette?", hint: "Blind Carbon Copy", options: ["Blind Carbon Copy", "Basic Carbon Copy", "Blind Courtesy Copy", "Blank Copy"], correct: 0 },
                { text: "What is 'teleconference' etiquette?", hint: "Mute when not speaking", options: ["Mute your microphone when not speaking, don't interrupt", "Speak loudly", "Eat during the call", "Multitask noisily"], correct: 0 },
                { text: "What does 'FWD' mean in a forwarded message?", hint: "Forward", options: ["Forward", "Feedback", "Follow-up", "Further"], correct: 0 },
                { text: "What does 'OOTO' mean in an automated response?", hint: "Out of the office", options: ["Out of the office", "One of the only", "Over the top", "Out of time"], correct: 0 },
                { text: "What is the appropriate way to end a cold call?", hint: "Thank the person", options: ["Thank you for your time. Goodbye.", "Just hang up", "That's all", "Bye now"], correct: 0 },
                { text: "What does 'EOD' mean in a deadline conversation?", hint: "End of day", options: ["End of Day", "Every Other Day", "Early Delivery", "Estimated Date"], correct: 0 },
                { text: "What does 'COB' mean in a business call?", hint: "Close of business", options: ["Close of Business", "Certificate of Business", "Call of Business", "Cost of Business"], correct: 0 },
                { text: "What does 'Re:' mean in an email subject line mentioned on a call?", hint: "Regarding", options: ["Regarding", "Reply", "Return", "Reverse"], correct: 0 }
            ]
        },
        "Grade 9": {
            name: "Grade 9",
            description: "Mastering numbers, abbreviations, and phone professionalism",
            questions: [
                { text: "What is the proper way to leave a professional voicemail for a job interview confirmation?", hint: "Name, purpose, number, time", options: ["Hello, this is [Name]. I am confirming my interview at [time]. Please call me back at [number]. Thank you.", "Hey, it's me. Call back.", "I'm confirming. Bye.", "Yo, call me for the interview."], correct: 0 },
                { text: "What does 'AI' stand for in a technology phone conversation?", hint: "Artificial Intelligence", options: ["Artificial Intelligence", "Artificial Information", "Automated Interface", "Advanced Integration"], correct: 0 },
                { text: "What does 'IoT' mean in a tech call?", hint: "Internet of Things", options: ["Internet of Things", "Input Output Transfer", "Integrated Operational Technology", "Internet of Text"], correct: 0 },
                { text: "What does 'SLA' mean in a service agreement call?", hint: "Service Level Agreement", options: ["Service Level Agreement", "Service License Agreement", "Standard Level Agreement", "System Level Agreement"], correct: 0 },
                { text: "What does 'QoS' mean in a network call?", hint: "Quality of Service", options: ["Quality of Service", "Quantity of Service", "Quick Operating System", "Query of Status"], correct: 0 },
                { text: "When negotiating on the phone, what does 'BATNA' stand for?", hint: "Best Alternative to a Negotiated Agreement", options: ["Best Alternative to a Negotiated Agreement", "Basic Agreement Terms and Actions", "Binding Actions Towards New Agreement", "Backup Agreement for Negotiation"], correct: 0 },
                { text: "What is the purpose of a 'call agenda' before a business call?", hint: "Keeps meeting focused", options: ["To keep the conversation focused and efficient", "To waste time", "To confuse participants", "To show off"], correct: 0 },
                { text: "What does 'POC' mean in a project status call?", hint: "Point of Contact", options: ["Point of Contact", "Proof of Concept", "Piece of Cake", "Plan of Care"], correct: 0 },
                { text: "What is the correct way to handle a dropped call?", hint: "Call back and apologize", options: ["Call back immediately and apologize for the disconnection", "Wait for them to call", "Do nothing", "Send a text"], correct: 0 },
                { text: "What does 'WFH' mean in a remote work call?", hint: "Work from home", options: ["Work From Home", "Wait for Help", "Work for Hire", "Weekend from Home"], correct: 0 },
                { text: "What is a 'talking point' on a business call?", hint: "Key topic to discuss", options: ["A key topic or message to discuss during the call", "A rhetorical question", "A joke", "A complaint"], correct: 0 },
                { text: "What does 'EOD' help colleagues understand?", hint: "Deadline", options: ["When a task needs to be completed (end of day)", "A location", "A salary", "A meeting time"], correct: 0 }
            ]
        }
    };

    // Ensure each grade has enough questions
    const gradeList = ["PP1", "PP2", "Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9"];
    
    for (let grade of gradeList) {
        if (gradeQuestions[grade] && gradeQuestions[grade].questions.length < 12) {
            const originalQs = [...gradeQuestions[grade].questions];
            while (gradeQuestions[grade].questions.length < 12) {
                gradeQuestions[grade].questions.push({ ...originalQs[gradeQuestions[grade].questions.length % originalQs.length] });
            }
        }
    }

    let currentGrade = "Grade 4";
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    let answerLocked = false;
    let selectedAnswerIndex = null;
    let questionResult = null;
    let currentShuffledQuestion = null;

    const quizMain = document.getElementById('quizMain');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = currentScore;
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function selectGrade(grade) {
        currentGrade = grade;
        const gradeData = gradeQuestions[grade];
        if (gradeData) {
            currentQuestions = [...gradeData.questions];
            gradeInfoArea.innerHTML = `📞 ${gradeData.name}: ${gradeData.description} | ${currentQuestions.length} questions`;
        } else {
            currentQuestions = [];
            gradeInfoArea.innerHTML = `📞 ${grade}: Ready to learn numbers & abbreviations!`;
        }
        
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderGradeButtons();
        renderCurrentQuestion();
    }

    function getShuffledCurrentQuestion() {
        if (!currentQuestions.length) return null;
        const originalQ = currentQuestions[currentQuestionIndex];
        if (!originalQ) return null;
        if (!currentShuffledQuestion) {
            currentShuffledQuestion = shuffleAnswers(originalQ);
        }
        return currentShuffledQuestion;
    }

    function handleAnswer(selectedIdx, correctIdx) {
        if (answerLocked) return;
        answerLocked = true;
        const isCorrect = (selectedIdx === correctIdx);
        if (isCorrect) {
            currentScore = Math.min(currentScore + 1, currentQuestions.length);
            updateTotalScoreUI();
            questionResult = 'correct';
        } else {
            questionResult = 'wrong';
        }
        selectedAnswerIndex = selectedIdx;
        renderCurrentQuestion();
    }

    function nextQuestion() {
        if (!answerLocked) return;
        if (currentQuestionIndex + 1 < currentQuestions.length) {
            currentQuestionIndex++;
            answerLocked = false;
            selectedAnswerIndex = null;
            questionResult = null;
            currentShuffledQuestion = null;
            renderCurrentQuestion();
        } else {
            renderCompletionScreen();
        }
    }

    function resetLevel() {
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderCurrentQuestion();
    }

    function renderCompletionScreen() {
        const totalQ = currentQuestions.length;
        const percentage = Math.round((currentScore / totalQ) * 100);
        let message = "";
        if (percentage >= 80) message = "🌟 Excellent! You're a Numbers & Abbreviations Champion! 🌟";
        else if (percentage >= 60) message = "👍 Good job! Keep practicing your phone etiquette!";
        else message = "📘 Keep learning! Try again to master numbers & abbreviations!";
        
        quizMain.innerHTML = `
            <div class="quiz-complete">
                <h2>🎉 ${currentGrade} Complete! 🎉</h2>
                <p style="margin: 1rem 0;"><strong>Your Score: ${currentScore} / ${totalQ}</strong></p>
                <p>${percentage}% - ${message}</p>
                <button id="resetGradeBtn" class="next-btn" style="background:#ffcd3c; margin-top:1rem;">🔄 Play Again</button>
                <button id="changeGradeBtn" class="next-btn" style="background:#e0e0e0; box-shadow:0 5px 0 #aaa; margin-top:0.5rem;">📚 Change Grade</button>
            </div>
        `;
        document.getElementById('resetGradeBtn')?.addEventListener('click', () => resetLevel());
        document.getElementById('changeGradeBtn')?.addEventListener('click', () => {
            document.querySelector('.grade-selector-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentQuestionIndex >= currentQuestions.length) {
            if (currentQuestions.length > 0 && currentQuestionIndex >= currentQuestions.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="quiz-complete"><h2>📞 Select a grade to begin!</h2><p>Choose your grade from the buttons above.</p></div>`;
            }
            return;
        }
        
        const shuffledQ = getShuffledCurrentQuestion();
        if (!shuffledQ) return;
        const hintText = shuffledQ.hint || "Learn to write numbers clearly and use polite abbreviations.";
        const isAnswered = answerLocked;
        const correctIdx = shuffledQ.correct;

        let answersHtml = '';
        shuffledQ.options.forEach((opt, idx) => {
            let additionalClass = '';
            let disabledAttr = isAnswered ? 'disabled-answer' : '';
            if (isAnswered && idx === correctIdx) additionalClass = 'correct-feedback';
            else if (isAnswered && idx === selectedAnswerIndex && idx !== correctIdx) additionalClass = 'wrong-feedback';
            answersHtml += `<div class="answer-card ${additionalClass} ${disabledAttr}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
        });
        
        const feedbackMsg = (questionResult === 'correct') ? '✅ Correct! +1 point ✅' : (questionResult === 'wrong' ? `❌ Oops! Correct answer: ${shuffledQ.options[correctIdx]} ❌` : '');
        
        quizMain.innerHTML = `
            <div class="progress-area">
                <div class="q-counter">📞 Question ${currentQuestionIndex+1} / ${currentQuestions.length}  |  ${currentGrade} Level</div>
                <div class="hint-box">💡 Hint: ${hintText}</div>
            </div>
            <div class="question-text">❓ ${shuffledQ.text}</div>
            <div class="answers-grid" id="answersGrid">
                ${answersHtml}
            </div>
            ${feedbackMsg ? `<div class="feedback-message" style="background:${questionResult === 'correct' ? '#c8f0d1' : '#ffe0db'}; color:${questionResult === 'correct' ? '#14532d' : '#991b1b'};">${feedbackMsg}</div>` : ''}
            ${isAnswered ? `<button id="nextBtnAction" class="next-btn">➡ Next Question ⬅</button>` : ''}
        `;
        
        if (!isAnswered) {
            document.querySelectorAll('.answer-card').forEach(div => {
                div.addEventListener('click', () => {
                    if (answerLocked) return;
                    const idx = parseInt(div.getAttribute('data-opt-index'));
                    handleAnswer(idx, correctIdx);
                });
            });
        } else {
            const nextBtnDom = document.getElementById('nextBtnAction');
            if (nextBtnDom) nextBtnDom.addEventListener('click', nextQuestion);
        }
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
    }

    initGame();
</script>
