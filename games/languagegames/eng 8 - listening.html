    const gradeList = ["PP1", "PP2", "Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9"];

    let currentGrade = "Grade 4";
    let currentWords = [];
    let currentIndex = 0;
    let score = 0;
    let answerLocked = false;
    let recognition = null;
    let isListening = false;
    let micPermissionGranted = false;

    const quizMain = document.getElementById('quizMain');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = score;
    }

    function speakText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }

    function evaluateAndAward(userAnswer) {
        if (answerLocked) return false;

        const target = currentWords[currentIndex].word.toLowerCase();
        const cleanUser = userAnswer.trim().toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim();
        const cleanTarget = target.toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim();

        let isMatch = (cleanUser === cleanTarget);
        if (!isMatch && (cleanUser.includes(cleanTarget) || cleanTarget.includes(cleanUser))) {
            if (Math.abs(cleanUser.length - cleanTarget.length) <= 3) isMatch = true;
        }

        if (isMatch && !answerLocked) {
            answerLocked = true;
            score++;
            updateTotalScoreUI();
            const resultDiv = document.getElementById('liveResult');
            if (resultDiv) {
                resultDiv.innerHTML = '<div class="result-feedback" style="background:#c8f0d1; color:#14532d;">🎉 CORRECT! +1 POINT! 🎉 Well spoken!</div>';
            }
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '✅ Great! Click NEXT WORD to continue.';
                statusDiv.className = 'status good-status';
            }
            const micBtn = document.getElementById('micBtn');
            const textInputField = document.getElementById('textInput');
            const submitBtn = document.getElementById('submitTextBtn');
            if (micBtn) micBtn.disabled = true;
            if (textInputField) textInputField.disabled = true;
            if (submitBtn) submitBtn.disabled = true;
            if (recognition) {
                recognition.abort();
                recognition = null;
                isListening = false;
            }
            return true;
        } else if (!answerLocked) {
            const resultDiv = document.getElementById('liveResult');
            if (resultDiv) {
                resultDiv.innerHTML = '<div class="result-feedback" style="background:#ffe0db; color:#991b1b;">❌ Not quite! Try again. Listen carefully. ❌</div>';
                setTimeout(() => {
                    if (!answerLocked && resultDiv.innerHTML.includes('Not quite')) {
                        resultDiv.innerHTML = '';
                    }
                }, 2000);
            }
            return false;
        }
        return false;
    }

    function startListening() {
        if (answerLocked) {
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '✅ Already scored! Click NEXT WORD.';
                statusDiv.className = 'status good-status';
            }
            return;
        }

        if (!micPermissionGranted) {
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '❌ Microphone not ready. Use the text box below.';
                statusDiv.className = 'status bad-status';
            }
            return;
        }

        const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognitionAPI) {
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '⚠️ Speech recognition not supported. Please use the text box.';
                statusDiv.className = 'status bad-status';
            }
            return;
        }

        if (recognition) recognition.abort();
        recognition = new SpeechRecognitionAPI();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        recognition.onstart = () => {
            isListening = true;
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.add('listening');
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '🎙️ Listening... Speak the word clearly! 🎙️';
                statusDiv.className = 'status warning-status';
            }
        };

        recognition.onerror = (event) => {
            isListening = false;
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('listening');
            let errorMsg = '⚠️ Could not hear you. Please type your answer.';
            if (event.error === 'no-speech') errorMsg = '🔇 No speech detected. Click mic and speak clearly.';
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = errorMsg;
                statusDiv.className = 'status bad-status';
            }
            recognition = null;
        };

        recognition.onend = () => {
            isListening = false;
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('listening');
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = `🗣️ You said: "${transcript}"`;
                statusDiv.className = 'status warning-status';
            }
            evaluateAndAward(transcript);
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            isListening = false;
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('listening');
        };

        recognition.start();
    }

    function nextWord() {
        if (!answerLocked && currentIndex < currentWords.length) {
            if (confirm('You haven\'t answered this word yet. Skip it? You will not get a point.')) {
                moveToNextWord();
            }
            return;
        }
        if (answerLocked) {
            moveToNextWord();
        }
    }

    function moveToNextWord() {
        if (currentIndex + 1 < currentWords.length) {
            currentIndex++;
            answerLocked = false;
            renderCurrentQuestion();
        } else if (currentIndex + 1 === currentWords.length && answerLocked) {
            currentIndex++;
            renderCompletionScreen();
        } else if (currentIndex >= currentWords.length) {
            renderCompletionScreen();
        } else {
            renderCurrentQuestion();
        }
    }

    function renderCompletionScreen() {
        const totalWords = currentWords.length;
        const perfect = score === totalWords;
        quizMain.innerHTML = `
            <div class="speaker-area" style="text-align:center;">
                <h2 style="color:#0f3b6f; font-size:clamp(1.2rem,5vw,1.8rem);">🎉 ${currentGrade} Complete! 🎉</h2>
                <p style="font-size:clamp(1rem,4vw,1.3rem); margin:0.8rem 0;">Your Score: ${score} / ${totalWords}</p>
                ${perfect ? '<p style="background:#c8f0d1; padding:0.5rem; border-radius:40px;">🏆 PERFECT SCORE! Pronunciation champion! 🏆</p>' : '<p>Great effort! Change grade or play again.</p>'}
                <button id="restartBtn" class="next-btn" style="background:#ffcd3c; margin-top:0.8rem;">🔄 PLAY THIS GRADE AGAIN</button>
            </div>
        `;
        const restartBtn = document.getElementById('restartBtn');
        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                currentIndex = 0;
                score = 0;
                answerLocked = false;
                updateTotalScoreUI();
                renderCurrentQuestion();
            });
        }
    }

    function renderCurrentQuestion() {
        if (!currentWords.length || currentIndex >= currentWords.length) {
            if (currentWords.length > 0 && currentIndex >= currentWords.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="speaker-area" style="text-align:center;"><p>Select a grade above to begin!</p></div>`;
            }
            return;
        }

        const wordObj = currentWords[currentIndex];
        const word = wordObj.word;
        const hint = wordObj.hint;
        const isAnswered = answerLocked;

        quizMain.innerHTML = `
            <div style="text-align:center; margin-bottom:0.5rem;">
                <span class="progress-info">🎯 Word ${currentIndex+1} / ${currentWords.length}  |  ${currentGrade}</span>
            </div>
            <div class="speaker-area">
                <div>🎧 Listen & Repeat:</div>
                <div class="target-word">${word}</div>
                <button id="listenBtn" class="listen-btn">🔊 LISTEN</button>
                <br>
                <button id="micBtn" class="microphone-btn" ${isAnswered ? 'disabled' : ''}>🎙️ ${isAnswered ? 'COMPLETED' : 'SPEAK & SCORE'}</button>
                <div id="dynamicStatus" class="status ${isAnswered ? 'good-status' : 'warning-status'}">${isAnswered ? '✅ Already scored! Click NEXT WORD.' : 'Click microphone and say the word clearly'}</div>
                <div id="liveResult"></div>
                <div style="margin-top:0.5rem; font-size:clamp(0.75rem,3vw,0.85rem); color:#035c8f;">💡 Hint: ${hint}</div>
            </div>
            <div class="text-input-area">
                <p>✏️ <strong>Type your answer (if microphone not working)</strong></p>
                <input type="text" id="textInput" class="text-input" placeholder="Type the word here..." autocomplete="off" ${isAnswered ? 'disabled' : ''}>
                <button id="submitTextBtn" class="submit-btn" ${isAnswered ? 'disabled' : ''}>✓ CHECK ANSWER</button>
            </div>
            <button id="nextWordBtn" class="next-btn">➡ NEXT WORD ⬅</button>
        `;

        const listenBtn = document.getElementById('listenBtn');
        if (listenBtn) listenBtn.addEventListener('click', () => speakText(word));

        const micBtn = document.getElementById('micBtn');
        if (micBtn && !isAnswered) micBtn.addEventListener('click', startListening);

        const submitBtn = document.getElementById('submitTextBtn');
        const textInputField = document.getElementById('textInput');
        if (submitBtn && !isAnswered) {
            submitBtn.addEventListener('click', () => {
                const typedAnswer = textInputField ? textInputField.value : '';
                if (typedAnswer.trim() === '') {
                    const statusDiv = document.getElementById('dynamicStatus');
                    if (statusDiv) {
                        statusDiv.innerHTML = 'Please type an answer first!';
                        statusDiv.className = 'status bad-status';
                    }
                    return;
                }
                evaluateAndAward(typedAnswer);
                if (textInputField) textInputField.value = '';
                if (answerLocked) renderCurrentQuestion();
            });
        }
        if (textInputField && !isAnswered) {
            textInputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = textInputField.value;
                    if (val.trim() !== '') {
                        evaluateAndAward(val);
                        textInputField.value = '';
                        if (answerLocked) renderCurrentQuestion();
                    }
                }
            });
        }

        const nextBtn = document.getElementById('nextWordBtn');
        if (nextBtn) nextBtn.addEventListener('click', () => nextWord());
    }

    function selectGrade(grade) {
        if (recognition) recognition.abort();
        currentGrade = grade;
        const gradeData = gradeWords[grade];
        if (gradeData) {
            currentWords = [...gradeData.words];
            gradeInfoArea.innerHTML = `🎤 ${gradeData.name}: ${gradeData.description} | ${currentWords.length} words`;
        } else {
            currentWords = [];
            gradeInfoArea.innerHTML = `🎤 ${grade}: Ready to speak!`;
        }
        currentIndex = 0;
        score = 0;
        answerLocked = false;
        updateTotalScoreUI();
        renderCurrentQuestion();
        renderGradeButtons();
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function initMicrophone() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                micPermissionGranted = true;
                stream.getTracks().forEach(track => track.stop());
                const gradeInfo = document.getElementById('gradeInfoArea');
                if (gradeInfo && gradeInfo.innerHTML.includes('Select')) {
                    gradeInfo.innerHTML = '🎤 Microphone ready! Choose your grade and start speaking!';
                }
            })
            .catch(err => {
                micPermissionGranted = false;
                console.warn("Microphone permission denied", err);
            });
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
        initMicrophone();
    }

    initGame();
</script>
</body>
</html>
