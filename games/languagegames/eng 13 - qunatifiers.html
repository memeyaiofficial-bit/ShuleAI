    function shuffleAnswers(questionObj) {
        const optionsWithMeta = questionObj.options.map((optText, idx) => ({
            text: optText,
            isCorrect: (idx === questionObj.correct)
        }));
        for (let i = optionsWithMeta.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];

        const shuffledOptions = [];
        let newCorrectIndex = -1;
        optionsWithMeta.forEach((item, newIdx) => {
            shuffledOptions.push(item.text);
            if (item.isCorrect) newCorrectIndex = newIdx;
        });
        return {
            text: questionObj.text,
            hint: questionObj.hint,
            options: shuffledOptions,
            correct: newCorrectIndex
        };
    }

                { text: "Complete: 'I speak ___ French; I can order food.' (some)", hint: "a little", options: ["a little", "little", "few", "a few"], correct: 0 },
                { text: "Complete: 'She has ___ patience; she gets angry easily.' (almost no)", hint: "little", options: ["little", "a little", "few", "a few"], correct: 0 },
                { text: "Complete: 'We have ___ eggs; enough to bake a cake.' (some)", hint: "a few", options: ["a few", "few", "a little", "little"], correct: 0 },
                { text: "Complete: 'There are ___ people I trust completely.' (very few)", hint: "few", options: ["few", "a few", "little", "a little"], correct: 0 },
                { text: "Complete: 'He has ___ knowledge of the subject.' (very little)", hint: "little", options: ["little", "a little", "few", "a few"], correct: 0 }
            ]
        },
        "Grade 7": {
            name: "Grade 7",
            description: "Each, Every, Either, Neither, Both, All",
            questions: [
                { text: "Which quantifier means 'every single one individually'?", hint: "Each", options: ["Each", "Every", "All", "Both"], correct: 0 },
                { text: "Which quantifier refers to 'every one of a group' (more general)?", hint: "Every", options: ["Every", "Each", "All", "Both"], correct: 0 },
                { text: "Which quantifier refers to 'one or the other of two'?", hint: "Either", options: ["Either", "Neither", "Both", "All"], correct: 0 },
                { text: "Which quantifier means 'not one nor the other of two'?", hint: "Neither", options: ["Neither", "Either", "Both", "All"], correct: 0 },
                { text: "Complete: '___ student must bring a pencil.' (universal)", hint: "Every", options: ["Every", "Each", "All", "Both"], correct: 0 },
                { text: "Complete: '___ of the two answers is correct.' (one or the other)", hint: "Either", options: ["Either", "Neither", "Both", "All"], correct: 0 },
                { text: "Complete: '___ of them was late.' (not one)", hint: "Neither", options: ["Neither", "Either", "Both", "All"], correct: 0 },
                { text: "Complete: '___ my parents are teachers.' (two)", hint: "Both", options: ["Both", "All", "Each", "Every"], correct: 0 },
                { text: "Complete: '___ children in the school attended the assembly.' (more than two)", hint: "All", options: ["All", "Both", "Each", "Every"], correct: 0 },
                { text: "Complete: '___ day, she practices the piano.'", hint: "Every", options: ["Every", "Each", "All", "Both"], correct: 0 },
                { text: "Complete: 'You can take ___ road; they both lead home.'", hint: "either", options: ["either", "neither", "both", "all"], correct: 0 },
                { text: "Complete: '___ of the answers was wrong.'", hint: "Neither", options: ["Neither", "Either", "Both", "All"], correct: 0 }
            ]
        },
        "Grade 8": {
            name: "Grade 8",
            description: "Enough, Too much, Too many, Sufficient",
            questions: [
                { text: "What does 'enough' mean?", hint: "As much as needed", options: ["as much as needed", "too little", "too much", "none"], correct: 0 },
                { text: "What does 'too much' mean with uncountable nouns?", hint: "More than needed", options: ["more than needed", "less than needed", "exactly enough", "none"], correct: 0 },
                { text: "What does 'too many' mean with countable nouns?", hint: "More than needed", options: ["more than needed", "less than needed", "exactly enough", "none"], correct: 0 },
                { text: "Complete: 'Do we have ___ chairs for everyone?'", hint: "Enough", options: ["enough", "too many", "too much", "little"], correct: 0 },
                { text: "Complete: 'There are ___ people in the room; it's crowded.'", hint: "too many", options: ["too many", "too much", "enough", "a few"], correct: 0 },
                { text: "Complete: 'There is ___ salt in the soup; it's very salty.'", hint: "too much", options: ["too much", "too many", "enough", "a little"], correct: 0 },
                { text: "Complete: 'She doesn't have ___ experience for the job.'", hint: "enough", options: ["enough", "too much", "too many", "plenty"], correct: 0 },
                { text: "Complete: 'I ate ___ cake; now I feel sick.'", hint: "too much", options: ["too much", "too many", "enough", "a little"], correct: 0 },
                { text: "Complete: 'He asked ___ questions; it was annoying.'", hint: "too many", options: ["too many", "too much", "enough", "some"], correct: 0 },
                { text: "What does 'sufficient' mean?", hint: "Enough", options: ["enough", "too much", "too little", "none"], correct: 0 },
                { text: "Complete: 'We have ___ evidence to prove the case.'", hint: "sufficient", options: ["sufficient", "too much", "too many", "little"], correct: 0 },
                { text: "Complete: 'There is ___ noise in the library.' (excessive)", hint: "too much", options: ["too much", "too many", "enough", "some"], correct: 0 }
            ]
        },
        "Grade 9": {
            name: "Grade 9",
            description: "Advanced phrasal quantifiers: the majority of, a minority of, a plethora of",
            questions: [
                { text: "What does 'the majority of' mean?", hint: "More than half", options: ["more than half", "less than half", "all", "none"], correct: 0 },
                { text: "What does 'a minority of' mean?", hint: "Less than half", options: ["less than half", "more than half", "all", "none"], correct: 0 },
                { text: "What does 'a plethora of' mean?", hint: "An excessive amount", options: ["an excessive amount", "a small amount", "none", "half"], correct: 0 },
                { text: "Complete: '___ the students passed the exam.' (more than half)", hint: "The majority of", options: ["The majority of", "A minority of", "A plethora of", "A few"], correct: 0 },
                { text: "Complete: 'Only ___ the voters supported the new policy.' (less than half)", hint: "a minority of", options: ["a minority of", "the majority of", "a plethora of", "all of"], correct: 0 },
                { text: "Complete: 'We have ___ options to choose from.' (many)", hint: "a plethora of", options: ["a plethora of", "a minority of", "a little", "a few"], correct: 0 },
                { text: "What does 'a multitude of' mean?", hint: "A very large number", options: ["a very large number", "a small number", "none", "a few"], correct: 0 },
                { text: "What does 'a fraction of' mean?", hint: "A small part", options: ["a small part", "a large part", "all", "none"], correct: 0 },
                { text: "Complete: '___ the workforce is employed in agriculture.'", hint: "A large proportion of", options: ["A large proportion of", "A minority of", "A few", "Little"], correct: 0 },
                { text: "Complete: 'The project required ___ resources.' (a very large amount)", hint: "a plethora of", options: ["a plethora of", "a minority of", "a few", "little"], correct: 0 },
                { text: "Complete: 'Only ___ the budget was spent on marketing.' (a small part)", hint: "a fraction of", options: ["a fraction of", "the majority of", "a plethora of", "all of"], correct: 0 },
                { text: "Complete: 'The company hired ___ new employees.' (many)", hint: "a multitude of", options: ["a multitude of", "a minority of", "a little", "few"], correct: 0 }
            ]
        }
    };

    // Ensure each grade has enough questions
    const gradeList = ["PP1", "PP2", "Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9"];
    
    for (let grade of gradeList) {
        if (gradeQuestions[grade] && gradeQuestions[grade].questions.length < 12) {
            const originalQs = [...gradeQuestions[grade].questions];
            while (gradeQuestions[grade].questions.length < 12) {
                gradeQuestions[grade].questions.push({ ...originalQs[gradeQuestions[grade].questions.length % originalQs.length] });
            }
        }
    }

    let currentGrade = "Grade 4";
    let currentQuestions = [];
    let currentIndex = 0;
    let currentScore = 0;
    let answerLocked = false;
    let selectedAnswerIndex = null;
    let questionResult = null;
    let currentShuffledQuestion = null;
    let totalQuestionsForGrade = 0;

    const quizMain = document.getElementById('quizMain');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = currentScore;
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function selectGrade(grade) {
        currentGrade = grade;
        const gradeData = gradeQuestions[grade];
        if (gradeData) {
            currentQuestions = [...gradeData.questions];
            totalQuestionsForGrade = currentQuestions.length;
            gradeInfoArea.innerHTML = `📊 ${gradeData.name}: Quantifiers | ${totalQuestionsForGrade} questions`;
        } else {
            currentQuestions = [];
            totalQuestionsForGrade = 0;
            gradeInfoArea.innerHTML = `📊 ${grade}: Ready to learn quantifiers!`;
        }
        
        currentIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderGradeButtons();
        renderCurrentQuestion();
    }

    function getShuffledCurrentQuestion() {
        if (!currentQuestions.length) return null;
        const originalQ = currentQuestions[currentIndex];
        if (!originalQ) return null;
        if (!currentShuffledQuestion) {
            currentShuffledQuestion = shuffleAnswers(originalQ);
        }
        return currentShuffledQuestion;
    }

    function handleAnswer(selectedIdx, correctIdx) {
        if (answerLocked) return;
        answerLocked = true;
        const isCorrect = (selectedIdx === correctIdx);
        if (isCorrect) {
            currentScore = Math.min(currentScore + 1, currentQuestions.length);
            updateTotalScoreUI();
            questionResult = 'correct';
        } else {
            questionResult = 'wrong';
        }
        selectedAnswerIndex = selectedIdx;
        renderCurrentQuestion();
    }

    function nextQuestion() {
        if (!answerLocked) return;
        if (currentIndex + 1 < currentQuestions.length) {
            currentIndex++;
            answerLocked = false;
            selectedAnswerIndex = null;
            questionResult = null;
            currentShuffledQuestion = null;
            renderCurrentQuestion();
        } else {
            renderCompletionScreen();
        }
    }

    function resetLevel() {
        currentIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderCurrentQuestion();
    }

    function renderCompletionScreen() {
        const totalQ = currentQuestions.length;
        const percentage = Math.round((currentScore / totalQ) * 100);
        let message = "";
        if (percentage >= 80) message = "🌟 Excellent! You're a Quantifier Champion! 🌟";
        else if (percentage >= 60) message = "👍 Good job! Keep practicing your quantifiers!";
        else message = "📘 Keep learning! Try again to master quantifiers!";
        
        quizMain.innerHTML = `
            <div class="quiz-complete">
                <h2>🎉 ${currentGrade} Quantifiers Complete! 🎉</h2>
                <p style="margin: 1rem 0;"><strong>Your Score: ${currentScore} / ${totalQ}</strong></p>
                <p>${percentage}% - ${message}</p>
                <button id="resetGradeBtn" class="next-btn" style="background:#ffcd3c; margin-top:1rem;">🔄 Play Again</button>
                <button id="changeGradeBtn" class="next-btn" style="background:#e0e0e0; box-shadow:0 5px 0 #aaa; margin-top:0.5rem;">📚 Change Grade</button>
            </div>
        `;
        document.getElementById('resetGradeBtn')?.addEventListener('click', () => resetLevel());
        document.getElementById('changeGradeBtn')?.addEventListener('click', () => {
            document.querySelector('.grade-selector-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentIndex >= currentQuestions.length) {
            if (currentQuestions.length > 0 && currentIndex >= currentQuestions.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="quiz-complete"><h2>📊 Select a grade to begin!</h2><p>Choose your grade from the buttons above.</p></div>`;
            }
            return;
        }
        
        const shuffledQ = getShuffledCurrentQuestion();
        if (!shuffledQ) return;
        const hintText = shuffledQ.hint || "Quantifiers tell us 'how many' or 'how much'.";
        const isAnswered = answerLocked;
        const correctIdx = shuffledQ.correct;

        let answersHtml = '';
        shuffledQ.options.forEach((opt, idx) => {
            let additionalClass = '';
            let disabledAttr = isAnswered ? 'disabled-answer' : '';
            if (isAnswered && idx === correctIdx) additionalClass = 'correct-feedback';
            else if (isAnswered && idx === selectedAnswerIndex && idx !== correctIdx) additionalClass = 'wrong-feedback';
            answersHtml += `<div class="answer-card ${additionalClass} ${disabledAttr}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
        });
        
        const feedbackMsg = (questionResult === 'correct') ? '✅ Correct! +1 point ✅' : (questionResult === 'wrong' ? `❌ Oops! Correct answer: ${shuffledQ.options[correctIdx]} ❌` : '');
        
        quizMain.innerHTML = `
            <div class="progress-area">
                <div class="q-counter">📊 Question ${currentIndex+1} / ${currentQuestions.length}  |  ${currentGrade} Level</div>
                <div class="hint-box">💡 Hint: ${hintText}</div>
            </div>
            <div class="question-text">❓ ${shuffledQ.text}</div>
            <div class="answers-grid" id="answersGrid">
                ${answersHtml}
            </div>
            ${feedbackMsg ? `<div class="feedback-message" style="background:${questionResult === 'correct' ? '#c8f0d1' : '#ffe0db'}; color:${questionResult === 'correct' ? '#14532d' : '#991b1b'};">${feedbackMsg}</div>` : ''}
            ${isAnswered ? `<button id="nextBtnAction" class="next-btn">➡ Next Question ⬅</button>` : ''}
        `;
        
        if (!isAnswered) {
            document.querySelectorAll('.answer-card').forEach(div => {
                div.addEventListener('click', () => {
                    if (answerLocked) return;
                    const idx = parseInt(div.getAttribute('data-opt-index'));
                    handleAnswer(idx, correctIdx);
                });
            });
        } else {
            const nextBtnDom = document.getElementById('nextBtnAction');
            if (nextBtnDom) nextBtnDom.addEventListener('click', nextQuestion);
        }
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
    }

    initGame();
</script>
</body>
</html>
