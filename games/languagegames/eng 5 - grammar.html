    function shuffleAnswers(questionObj) {
        const optionsWithMeta = questionObj.options.map((optText, idx) => ({
            text: optText,
            isCorrect: (idx === questionObj.correct)
        }));
        for (let i = optionsWithMeta.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
        }
        const shuffledOptions = [];
        let newCorrectIndex = -1;
        optionsWithMeta.forEach((item, newIdx) => {
            shuffledOptions.push(item.text);
            if (item.isCorrect) newCorrectIndex = newIdx;
        });
        return {
            text: questionObj.text,
            hint: questionObj.hint,
            options: shuffledOptions,
            correct: newCorrectIndex
        };
    }

                { text: "Fix pronoun error: 'Each student must bring their book.'", hint: "Use 'his or her'", options: ["Each student must bring his or her book.", "Each student must bring their book.", "Each student must bring its book.", "Each student must bring our book."], correct: 0 },
                { text: "What is point of view?", hint: "Perspective", options: ["Who is telling the story (first, second, third person)", "The setting", "The conflict", "The resolution"], correct: 0 },
                { text: "Which is first-person point of view?", hint: "Uses 'I'", options: ["I went to the store.", "He went to the store.", "You went to the store.", "They went to the store."], correct: 0 },
                { text: "Which is third-person point of view?", hint: "Uses 'he/she/they'", options: ["She walked home.", "I walked home.", "You walked home.", "We walked home."], correct: 0 },
                { text: "What is plagiarism?", hint: "Using others' work", options: ["Using someone else's work without credit", "Writing your own ideas", "Editing your work", "Reading a book"], correct: 0 }
            ]
        },
        "Grade 7": {
            name: "Grade 7",
            description: "Advanced writing: tone, voice, and persuasion",
            questions: [
                { text: "What is author's tone?", hint: "Attitude", options: ["The author's attitude toward the subject", "The length of the text", "The number of paragraphs", "The title of the work"], correct: 0 },
                { text: "What is persuasive writing?", hint: "Convince", options: ["Writing that tries to convince the reader", "Writing that tells a story", "Writing that describes something", "Writing that explains facts"], correct: 0 },
                { text: "What is pathos in persuasive writing?", hint: "Emotion", options: ["An appeal to emotion", "An appeal to logic", "An appeal to credibility", "An appeal to authority"], correct: 0 },
                { text: "What is ethos in persuasive writing?", hint: "Credibility", options: ["An appeal to ethics or credibility", "An appeal to emotion", "An appeal to logic", "An appeal to fear"], correct: 0 },
                { text: "What is logos in persuasive writing?", hint: "Logic", options: ["An appeal to logic and reason", "An appeal to emotion", "An appeal to credibility", "An appeal to tradition"], correct: 0 },
                { text: "What is a counterargument?", hint: "Opposite view", options: ["An opposing viewpoint that you address", "Your main argument", "The conclusion", "The introduction"], correct: 0 },
                { text: "What is a rebuttal?", hint: "Response to counterargument", options: ["Your response to a counterargument", "The first sentence", "The last sentence", "A question"], correct: 0 },
                { text: "What is active voice?", hint: "Subject does action", options: ["The subject performs the action", "The subject receives the action", "Passive construction", "Question form"], correct: 0 },
                { text: "Which sentence is in active voice?", hint: "Subject acts", options: ["The boy kicked the ball.", "The ball was kicked by the boy.", "The ball was kicked.", "Kicked was the ball."], correct: 0 },
                { text: "What is a modifier?", hint: "Describes", options: ["A word or phrase that describes another word", "A verb", "A noun", "A punctuation mark"], correct: 0 },
                { text: "Fix dangling modifier: 'Running fast, the finish line was reached.'", hint: "Who was running?", options: ["Running fast, he reached the finish line.", "Running fast, the finish line was reached by him.", "Running fast reached finish line.", "Running fast, reached finish line."], correct: 0 },
                { text: "What is a thesis statement?", hint: "Main argument", options: ["The main argument of the entire essay", "A supporting detail", "The first sentence", "The conclusion"], correct: 0 }
            ]
        },
        "Grade 8": {
            name: "Grade 8",
            description: "Literary analysis and advanced composition",
            questions: [
                { text: "What is literary analysis?", hint: "Examining literature", options: ["Examining and interpreting a piece of literature", "Writing a story", "Editing grammar", "Reading quickly"], correct: 0 },
                { text: "What is evidence in writing?", hint: "Proof", options: ["Facts, quotes, or examples that support your claim", "Your opinion", "The title", "The introduction"], correct: 0 },
                { text: "What is an example of textual evidence?", hint: "Quote from text", options: ["A direct quote from the text", "Your own opinion", "A picture", "A summary"], correct: 0 },
                { text: "What is a claim in argumentative writing?", hint: "Your position", options: ["Your main position or argument", "A fact", "A question", "The conclusion"], correct: 0 },
                { text: "What is a counterclaim?", hint: "Opposite argument", options: ["An opposing argument", "Your main argument", "A supporting detail", "A conclusion"], correct: 0 },
                { text: "What is coherence in writing?", hint: "Logical flow", options: ["Ideas that are logically connected and easy to follow", "Correct spelling", "Long sentences", "Fancy words"], correct: 0 },
                { text: "What is a transition sentence?", hint: "Links paragraphs", options: ["A sentence that connects one paragraph to the next", "The first sentence", "The last sentence", "A question"], correct: 0 },
                { text: "What is academic vocabulary?", hint: "Formal words", options: ["Formal words used in academic writing", "Slang words", "Short words", "Simple words"], correct: 0 },
                { text: "What is a bibliography?", hint: "Sources list", options: ["A list of sources used in your writing", "The introduction", "The conclusion", "The title page"], correct: 0 },
                { text: "What is a citation?", hint: "Credit source", options: ["A reference to a source of information", "A quote", "A footnote", "A heading"], correct: 0 },
                { text: "What is paraphrasing?", hint: "Rewrite in own words", options: ["Restating someone else's ideas in your own words", "Directly quoting", "Copying exactly", "Summarizing only"], correct: 0 },
                { text: "What is the difference between summarizing and paraphrasing?", hint: "Length and detail", options: ["Summarizing is shorter; paraphrasing is similar length", "They are the same", "Summarizing is longer", "Paraphrasing is shorter"], correct: 0 }
            ]
        },
        "Grade 9": {
            name: "Grade 9",
            description: "Research writing and advanced revision",
            questions: [
                { text: "What is a research paper?", hint: "Uses sources", options: ["A paper that uses multiple sources to support a thesis", "A story", "A poem", "A personal journal"], correct: 0 },
                { text: "What is a primary source?", hint: "Original document", options: ["Original document or firsthand account", "A textbook", "An encyclopedia", "A review"], correct: 0 },
                { text: "What is a secondary source?", hint: "Interprets primary", options: ["A source that interprets or analyzes primary sources", "An original letter", "A diary", "A photograph"], correct: 0 },
                { text: "What is MLA format commonly used for?", hint: "Citation style", options: ["A citation style for humanities papers", "A writing genre", "A punctuation rule", "A grammar rule"], correct: 0 },
                { text: "What is a Works Cited page?", hint: "Sources list", options: ["A list of all sources cited in the paper", "The title page", "The introduction", "The conclusion"], correct: 0 },
                { text: "What is peer review?", hint: "Classmate feedback", options: ["Having classmates give feedback on your writing", "Reviewing your own work", "Teacher grading", "Reading aloud"], correct: 0 },
                { text: "What is a rubric?", hint: "Scoring guide", options: ["A scoring guide for evaluating writing", "A type of paper", "A punctuation mark", "A grammar rule"], correct: 0 },
                { text: "What is an outline?", hint: "Organizational plan", options: ["A plan that organizes main ideas before writing", "The first draft", "The final paper", "The title"], correct: 0 },
                { text: "What is brainstorming?", hint: "Generating ideas", options: ["Generating ideas before writing", "Editing after writing", "Reading sources", "Checking grammar"], correct: 0 },
                { text: "What is freewriting?", hint: "Write without stopping", options: ["Writing continuously without editing for a set time", "Writing carefully", "Editing as you write", "Planning first"], correct: 0 },
                { text: "What does 'concise' mean in writing?", hint: "Short and clear", options: ["Using few words to express an idea clearly", "Using many words", "Using fancy words", "Using simple words"], correct: 0 },
                { text: "What is voice in writing?", hint: "Writer's personality", options: ["The unique personality and style of the writer", "The volume of reading", "The grammar", "The punctuation"], correct: 0 }
            ]
        }
    };

    // Ensure each grade has enough questions
    const gradeList = ["PP1", "PP2", "Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9"];
    
    for (let grade of gradeList) {
        if (gradeQuestions[grade] && gradeQuestions[grade].questions.length < 12) {
            const originalQs = [...gradeQuestions[grade].questions];
            while (gradeQuestions[grade].questions.length < 12) {
                gradeQuestions[grade].questions.push({ ...originalQs[gradeQuestions[grade].questions.length % originalQs.length] });
            }
        }
    }

    let currentGrade = "Grade 4";
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    let answerLocked = false;
    let selectedAnswerIndex = null;
    let questionResult = null;
    let currentShuffledQuestion = null;
    let totalQuestionsForGrade = 0;

    const quizMain = document.getElementById('quizMain');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = currentScore;
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function selectGrade(grade) {
        currentGrade = grade;
        const gradeData = gradeQuestions[grade];
        if (gradeData) {
            currentQuestions = [...gradeData.questions];
            totalQuestionsForGrade = currentQuestions.length;
            gradeInfoArea.innerHTML = `✍️ ${gradeData.name}: ${gradeData.description} | ${totalQuestionsForGrade} questions`;
        } else {
            currentQuestions = [];
            totalQuestionsForGrade = 0;
            gradeInfoArea.innerHTML = `✍️ ${grade}: Ready to begin guided writing!`;
        }
        
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderGradeButtons();
        renderCurrentQuestion();
    }

    function getShuffledCurrentQuestion() {
        if (!currentQuestions.length) return null;
        const originalQ = currentQuestions[currentQuestionIndex];
        if (!originalQ) return null;
        if (!currentShuffledQuestion) {
            currentShuffledQuestion = shuffleAnswers(originalQ);
        }
        return currentShuffledQuestion;
    }

    function handleAnswer(selectedIdx, correctIdx) {
        if (answerLocked) return;
        answerLocked = true;
        const isCorrect = (selectedIdx === correctIdx);
        if (isCorrect) {
            currentScore = Math.min(currentScore + 1, currentQuestions.length);
            updateTotalScoreUI();
            questionResult = 'correct';
        } else {
            questionResult = 'wrong';
        }
        selectedAnswerIndex = selectedIdx;
        renderCurrentQuestion();
    }

    function nextQuestion() {
        if (!answerLocked) return;
        if (currentQuestionIndex + 1 < currentQuestions.length) {
            currentQuestionIndex++;
            answerLocked = false;
            selectedAnswerIndex = null;
            questionResult = null;
            currentShuffledQuestion = null;
            renderCurrentQuestion();
        } else {
            renderCompletionScreen();
        }
    }

    function resetLevel() {
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderCurrentQuestion();
    }

    function renderCompletionScreen() {
        const totalQ = currentQuestions.length;
        const percentage = Math.round((currentScore / totalQ) * 100);
        let message = "";
        if (percentage >= 80) message = "🌟 Excellent! You're a Writing Champion! 🌟";
        else if (percentage >= 60) message = "👍 Good job! Keep practicing your writing skills!";
        else message = "📘 Keep learning! Try again to improve your writing knowledge!";
        
        quizMain.innerHTML = `
            <div class="quiz-complete">
                <h2>🎉 ${currentGrade} Guided Writing Complete! 🎉</h2>
                <p style="font-size:1.5rem; margin: 1rem 0;">✍️ Your Score: ${currentScore} / ${totalQ}</p>
                <p style="font-size:1rem;">${percentage}% - ${message}</p>
                <button id="resetGradeBtn" class="next-btn" style="background:#ffcd3c; margin-top:1rem;">🔄 Play Again</button>
                <button id="changeGradeBtn" class="next-btn" style="background:#e0e0e0; box-shadow:0 6px 0 #aaa;">📚 Change Grade</button>
            </div>
        `;
        document.getElementById('resetGradeBtn')?.addEventListener('click', () => resetLevel());
        document.getElementById('changeGradeBtn')?.addEventListener('click', () => {
            document.querySelector('.grade-selector-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentQuestionIndex >= currentQuestions.length) {
            if (currentQuestions.length > 0 && currentQuestionIndex >= currentQuestions.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="quiz-complete"><h2>✍️ Select a grade to start writing!</h2><p>Choose your grade from the buttons above to begin guided writing practice.</p></div>`;
            }
            return;
        }
        
        const shuffledQ = getShuffledCurrentQuestion();
        if (!shuffledQ) return;
        const hintText = shuffledQ.hint || "Think about writing rules and choose the best answer.";
        const isAnswered = answerLocked;
        const correctIdx = shuffledQ.correct;

        let answersHtml = '';
        shuffledQ.options.forEach((opt, idx) => {
            let additionalClass = '';
            let disabledAttr = isAnswered ? 'disabled-answer' : '';
            if (isAnswered && idx === correctIdx) additionalClass = 'correct-feedback';
            else if (isAnswered && idx === selectedAnswerIndex && idx !== correctIdx) additionalClass = 'wrong-feedback';
            answersHtml += `<div class="answer-card ${additionalClass} ${disabledAttr}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
        });
        
        const feedbackMsg = (questionResult === 'correct') ? '✅ Correct! +1 point ✅' : (questionResult === 'wrong' ? `❌ Oops! Correct answer: ${shuffledQ.options[correctIdx]} ❌` : '');
        
        quizMain.innerHTML = `
            <div class="progress-area">
                <div class="q-counter">✍️ Question ${currentQuestionIndex+1} / ${currentQuestions.length}  |  ${currentGrade} Level</div>
                <div class="hint-box">💡 Hint: ${hintText}</div>
            </div>
            <div class="question-text">❓ ${shuffledQ.text}</div>
            <div class="answers-grid" id="answersGrid">
                ${answersHtml}
            </div>
            ${feedbackMsg ? `<div style="text-align:center; font-weight:600; margin: 0.5rem 0;">${feedbackMsg}</div>` : ''}
            ${isAnswered ? `<button id="nextBtnAction" class="next-btn">➡ Next Question ⬅</button>` : ''}
        `;
        
        if (!isAnswered) {
            document.querySelectorAll('.answer-card').forEach(div => {
                div.addEventListener('click', () => {
                    if (answerLocked) return;
                    const idx = parseInt(div.getAttribute('data-opt-index'));
                    handleAnswer(idx, correctIdx);
                });
            });
        } else {
            const nextBtnDom = document.getElementById('nextBtnAction');
            if (nextBtnDom) nextBtnDom.addEventListener('click', nextQuestion);
        }
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
    }

    initGame();
</script>
</body>
</html>
