    function shuffleAnswers(questionObj) {
        const optionsWithMeta = questionObj.options.map((optText, idx) => ({
            text: optText,
            isCorrect: (idx === questionObj.correct)
        }));
        for (let i = optionsWithMeta.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
        }
        const shuffledOptions = [];
        let newCorrectIndex = -1;
        optionsWithMeta.forEach((item, newIdx) => {
            shuffledOptions.push(item.text);
            if (item.isCorrect) newCorrectIndex = newIdx;
        });
        return {
            text: questionObj.text,
            hint: questionObj.hint,
            options: shuffledOptions,
            correct: newCorrectIndex
        };
    }

                { text: "What is the masculine of 'cow'?", hint: "Male cow", options: ["bull", "ox", "cowboy", "calf"], correct: 0 },
                { text: "What is the feminine of 'prince'?", hint: "Female prince", options: ["princess", "princea", "prin", "princette"], correct: 0 },
                { text: "What is the masculine of 'hen'?", hint: "Male chicken", options: ["rooster", "cock", "roo", "chick"], correct: 0 },
                { text: "What is the feminine of 'waiter'?", hint: "Female server", options: ["waitress", "waitra", "waitrix", "waiteress"], correct: 0 },
                { text: "What is the masculine of 'mare'?", hint: "Male horse", options: ["stallion", "horse", "colt", "pony"], correct: 0 },
                { text: "What is the feminine of 'god'?", hint: "Female deity", options: ["goddess", "goda", "godette", "godix"], correct: 0 },
                { text: "What is the masculine of 'witch'?", hint: "Male witch", options: ["warlock", "wizard", "witcho", "witcher"], correct: 0 },
                { text: "What is the feminine of 'nephew'?", hint: "Niece", options: ["niece", "nephewess", "nephewra", "nephewa"], correct: 0 },
                { text: "What is the masculine of 'bride'?", hint: "Groom", options: ["groom", "bridegroom", "husband", "male bride"], correct: 0 }
            ]
        },
        "Grade 8": {
            name: "Grade 8",
            description: "Noun functions: subject, object, complement",
            questions: [
                { text: "What is the subject in: 'The dog barks loudly.'", hint: "Who does the action", options: ["dog", "barks", "loudly", "the"], correct: 0 },
                { text: "What is the object in: 'She kicked the ball.'", hint: "Receives the action", options: ["ball", "kicked", "she", "the"], correct: 0 },
                { text: "In 'The teacher is kind.', what is 'teacher'?", hint: "Sentence topic", options: ["Subject", "Object", "Possessive", "Collective"], correct: 0 },
                { text: "In 'He gave Mary a gift.', what is 'Mary'?", hint: "Indirect object", options: ["Mary", "gift", "gave", "he"], correct: 0 },
                { text: "Find the direct object: 'I read a book.'", hint: "What was read", options: ["book", "read", "I", "a"], correct: 0 },
                { text: "What is the subject complement: 'She is a doctor.'", hint: "Renames subject", options: ["doctor", "is", "she", "a"], correct: 0 },
                { text: "In 'The children ate lunch.', what is 'lunch'?", hint: "What was eaten", options: ["Object", "Subject", "Possessive", "Collective"], correct: 0 },
                { text: "Find the subject: 'Running is fun.'", hint: "What the sentence is about", options: ["Running", "is", "fun", "running is"], correct: 0 },
                { text: "What is the object: 'The cat chased the mouse.'", hint: "What was chased", options: ["mouse", "cat", "chased", "the"], correct: 0 },
                { text: "In 'They elected him president.', what is 'president'?", hint: "Object complement", options: ["president", "him", "elected", "they"], correct: 0 },
                { text: "Find the indirect object: 'Mom made us dinner.'", hint: "For whom", options: ["us", "dinner", "made", "Mom"], correct: 0 },
                { text: "What is the object of the preposition: 'She sat on the chair.'", hint: "After 'on'", options: ["chair", "sat", "she", "the"], correct: 0 }
            ]
        },
        "Grade 9": {
            name: "Grade 9",
            description: "Noun clauses and advanced noun usage",
            questions: [
                { text: "What is a noun clause?", hint: "Clause that acts as a noun", options: ["Clause acting as a noun", "A proper noun", "An abstract noun", "A plural noun"], correct: 0 },
                { text: "Find the noun clause: 'I know that you are honest.'", hint: "After 'know'", options: ["that you are honest", "I know", "you are", "honest"], correct: 0 },
                { text: "Find the noun clause acting as subject: 'What she said surprised me.'", hint: "Before the verb", options: ["What she said", "surprised me", "she said", "me"], correct: 0 },
                { text: "Which is a noun clause?", hint: "Starts with 'what/that/who'", options: ["That he came", "He came", "Came late", "Late arrival"], correct: 0 },
                { text: "Find the noun clause: 'Whoever wins gets a prize.'", hint: "Subject of the sentence", options: ["Whoever wins", "gets a prize", "a prize", "wins"], correct: 0 },
                { text: "In 'I believe that she is kind.', the noun clause is ____.", hint: "Object of believe", options: ["that she is kind", "I believe", "she is", "kind"], correct: 0 },
                { text: "What introduces most noun clauses?", hint: "That/what/who", options: ["That, what, who", "And, but, or", "Run, jump, play", "Quickly, slowly"], correct: 0 },
                { text: "Find the noun clause: 'How he did it remains a mystery.'", hint: "Subject of remains", options: ["How he did it", "remains a mystery", "a mystery", "he did"], correct: 0 },
                { text: "Which sentence contains a noun clause?", hint: "Has 'that' clause", options: ["I think that you're right.", "The dog barked.", "She is happy.", "Run fast!"], correct: 0 },
                { text: "Find the noun clause object: 'We wondered why he left.'", hint: "After wondered", options: ["why he left", "we wondered", "he left", "left"], correct: 0 },
                { text: "What type of clause is 'what you need' in 'Get what you need'?", hint: "Noun clause as object", options: ["Noun clause", "Adjective clause", "Adverb clause", "Relative clause"], correct: 0 },
                { text: "Find the noun clause: 'Who will win is uncertain.'", hint: "Subject of 'is'", options: ["Who will win", "will win", "is uncertain", "uncertain"], correct: 0 }
            ]
        }
    };

    const gradeList = ["PP1", "PP2", "Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9"];
    
    let currentGrade = "Grade 4";
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    let answerLocked = false;
    let selectedAnswerIndex = null;
    let questionResult = null;
    let currentShuffledQuestion = null;
    let totalQuestionsForGrade = 0;

    const quizMain = document.getElementById('quizMain');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = currentScore;
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function selectGrade(grade) {
        currentGrade = grade;
        const gradeData = gradeQuestions[grade];
        if (gradeData) {
            currentQuestions = [...gradeData.questions];
            totalQuestionsForGrade = currentQuestions.length;
            gradeInfoArea.innerHTML = `📚 ${gradeData.name}: ${gradeData.description} | ${totalQuestionsForGrade} questions`;
        } else {
            currentQuestions = [];
            totalQuestionsForGrade = 0;
            gradeInfoArea.innerHTML = `📚 ${grade}: Ready to learn nouns!`;
        }
        
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderGradeButtons();
        renderCurrentQuestion();
    }

    function getShuffledCurrentQuestion() {
        if (!currentQuestions.length) return null;
        const originalQ = currentQuestions[currentQuestionIndex];
        if (!originalQ) return null;
        if (!currentShuffledQuestion) {
            currentShuffledQuestion = shuffleAnswers(originalQ);
        }
        return currentShuffledQuestion;
    }

    function handleAnswer(selectedIdx, correctIdx) {
        if (answerLocked) return;
        answerLocked = true;
        const isCorrect = (selectedIdx === correctIdx);
        if (isCorrect) {
            currentScore++;
            updateTotalScoreUI();
            questionResult = 'correct';
        } else {
            questionResult = 'wrong';
        }
        selectedAnswerIndex = selectedIdx;
        renderCurrentQuestion();
    }

    function nextQuestion() {
        if (!answerLocked) return;
        if (currentQuestionIndex + 1 < currentQuestions.length) {
            currentQuestionIndex++;
            answerLocked = false;
            selectedAnswerIndex = null;
            questionResult = null;
            currentShuffledQuestion = null;
            renderCurrentQuestion();
        } else {
            renderCompletionScreen();
        }
    }

    function resetLevel() {
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderCurrentQuestion();
    }

    function renderCompletionScreen() {
        const totalQ = currentQuestions.length;
        const percentage = Math.round((currentScore / totalQ) * 100);
        let message = "";
        if (percentage >= 80) message = "🌟 Excellent! You're a Noun Master! 🌟";
        else if (percentage >= 60) message = "👍 Good job! Keep practicing to become a noun expert!";
        else message = "📘 Keep learning! Try again to improve your noun knowledge!";
        
        quizMain.innerHTML = `
            <div class="quiz-complete">
                <h2>🎉 ${currentGrade} Nouns Complete! 🎉</h2>
                <p style="font-size:1.5rem; margin: 1rem 0;">📊 Your Score: ${currentScore} / ${totalQ}</p>
                <p style="font-size:1rem;">${percentage}% - ${message}</p>
                <button id="resetGradeBtn" class="next-btn" style="background:#ffcd3c; margin-top:1rem;">🔄 Play Again</button>
                <button id="changeGradeBtn" class="next-btn reset-btn" style="background:#e0e0e0; box-shadow:0 6px 0 #aaa;">📚 Change Grade</button>
            </div>
        `;
        document.getElementById('resetGradeBtn')?.addEventListener('click', () => resetLevel());
        document.getElementById('changeGradeBtn')?.addEventListener('click', () => {
            // Scroll to grade selector
            document.querySelector('.grade-selector-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentQuestionIndex >= currentQuestions.length) {
            if (currentQuestions.length > 0 && currentQuestionIndex >= currentQuestions.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="quiz-complete"><h2>📚 Select a grade to start learning nouns!</h2><p>Choose your grade from the buttons above.</p></div>`;
            }
            return;
        }
        
        const shuffledQ = getShuffledCurrentQuestion();
        if (!shuffledQ) return;
        const hintText = shuffledQ.hint || "Think about the type of noun being described.";
        const isAnswered = answerLocked;
        const correctIdx = shuffledQ.correct;

        let answersHtml = '';
        shuffledQ.options.forEach((opt, idx) => {
            let additionalClass = '';
            let disabledAttr = isAnswered ? 'disabled-answer' : '';
            if (isAnswered && idx === correctIdx) additionalClass = 'correct-feedback';
            else if (isAnswered && idx === selectedAnswerIndex && idx !== correctIdx) additionalClass = 'wrong-feedback';
            answersHtml += `<div class="answer-card ${additionalClass} ${disabledAttr}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
        });
        
        const feedbackMsg = (questionResult === 'correct') ? '✅ Correct! +1 point ✅' : (questionResult === 'wrong' ? `❌ Oops! Correct answer: ${shuffledQ.options[correctIdx]} ❌` : '');
        
        quizMain.innerHTML = `
            <div class="progress-area">
                <div class="q-counter">📖 Question ${currentQuestionIndex+1} / ${currentQuestions.length}  |  ${currentGrade} Level</div>
                <div class="hint-box">💡 Hint: ${hintText}</div>
            </div>
            <div class="question-text">❓ ${shuffledQ.text}</div>
            <div class="answers-grid" id="answersGrid">
                ${answersHtml}
            </div>
            ${feedbackMsg ? `<div style="text-align:center; font-weight:600; margin: 0.5rem 0;">${feedbackMsg}</div>` : ''}
            ${isAnswered ? `<button id="nextBtnAction" class="next-btn">➡ Next Question ⬅</button>` : ''}
        `;
        
        if (!isAnswered) {
            document.querySelectorAll('.answer-card').forEach(div => {
                div.addEventListener('click', () => {
                    if (answerLocked) return;
                    const idx = parseInt(div.getAttribute('data-opt-index'));
                    handleAnswer(idx, correctIdx);
                });
            });
        } else {
            const nextBtnDom = document.getElementById('nextBtnAction');
            if (nextBtnDom) nextBtnDom.addEventListener('click', nextQuestion);
        }
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
    }

    initGame();
</script>
</body>
</html>
