                { prompt: "What does 'market' mean in business? Say the definition.", expected: "where buyers and sellers meet", hint: "Customers" },
                { prompt: "What is 'profit'? Say the definition.", expected: "money left after costs", hint: "Earnings" },
                { prompt: "What does 'customer service' mean? Say the definition.", expected: "helping customers", hint: "Client care" },
                { prompt: "What is 'branding'? Say the definition.", expected: "company image", hint: "Identity" },
                { prompt: "What does 'risk' mean in business? Say the definition.", expected: "chance of loss", hint: "Uncertainty" },
                { prompt: "What does 'scaling' a business mean? Say the definition.", expected: "growing the business", hint: "Expanding" }
            ]
        }
    };

    // Ensure each grade has enough questions
    const gradeList = ["PP1", "PP2", "Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9"];
    
    for (let grade of gradeList) {
        if (gradeQuestions[grade] && gradeQuestions[grade].questions.length < 10) {
            const originalQs = [...gradeQuestions[grade].questions];
            while (gradeQuestions[grade].questions.length < 10) {
                gradeQuestions[grade].questions.push({ ...originalQs[gradeQuestions[grade].questions.length % originalQs.length] });
            }
        }
    }

    let currentGrade = "Grade 4";
    let currentQuestions = [];
    let currentIndex = 0;
    let currentScore = 0;
    let answerLocked = false;
    let recognition = null;
    let autoNextTimer = null;
    let micPermissionGranted = false;

    const quizMain = document.getElementById('quizMain');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = currentScore;
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function selectGrade(grade) {
        if (autoNextTimer) clearTimeout(autoNextTimer);
        if (recognition) { try { recognition.abort(); } catch(e) {} recognition = null; }
        currentGrade = grade;
        const gradeData = gradeQuestions[grade];
        if (gradeData) {
            currentQuestions = [...gradeData.questions];
            gradeInfoArea.innerHTML = `💼 ${gradeData.name}: ${gradeData.description} | ${currentQuestions.length} questions`;
        } else {
            currentQuestions = [];
            gradeInfoArea.innerHTML = `💼 ${grade}: Ready to speak about careers!`;
        }
        
        currentIndex = 0;
        currentScore = 0;
        answerLocked = false;
        updateTotalScoreUI();
        renderGradeButtons();
        renderCurrentQuestion();
    }

    // Voice output function with speech synthesis
    function speakText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    function normalizeText(text) {
        return text.trim().toLowerCase()
            .replace(/[^\w\s]/g, '')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function checkAnswerAndAward(userAnswer) {
        if (answerLocked) return false;
        const currentQ = currentQuestions[currentIndex];
        const expected = currentQ.expected.toLowerCase();
        const normalizedExpected = normalizeText(expected);
        const normalizedAnswer = normalizeText(userAnswer);
        
        let isMatch = (normalizedAnswer === normalizedExpected);
        
        if (!isMatch && (normalizedAnswer.includes(normalizedExpected) || normalizedExpected.includes(normalizedAnswer))) {
            if (Math.abs(normalizedAnswer.length - normalizedExpected.length) <= 5) isMatch = true;
        }
        
        // Special cases for common variations
        if (!isMatch && expected === "doctor" && normalizedAnswer.includes("doc")) isMatch = true;
        if (!isMatch && expected === "teacher" && normalizedAnswer.includes("teach")) isMatch = true;
        if (!isMatch && expected === "firefighter" && (normalizedAnswer.includes("fire fighter") || normalizedAnswer.includes("fireman"))) isMatch = true;
        if (!isMatch && expected === "police officer" && (normalizedAnswer.includes("police") || normalizedAnswer.includes("cop"))) isMatch = true;
        if (!isMatch && expected === "help sick people" && normalizedAnswer.includes("help sick")) isMatch = true;
        if (!isMatch && expected === "put out fires" && normalizedAnswer.includes("put out")) isMatch = true;
        
        // Voice feedback: Tell the student if they are correct or wrong
        if (isMatch) {
            // Correct answer - voice feedback
            speakText("Correct! Well done! You get one point.");
        } else {
            // Wrong answer - voice feedback with correct answer
            speakText(`Wrong answer. The correct answer is ${expected}. Keep practicing!`);
        }
        
        if (isMatch && !answerLocked) {
            answerLocked = true;
            currentScore = Math.min(currentScore + 1, currentQuestions.length);
            updateTotalScoreUI();
            renderCurrentQuestion(true);
            if (autoNextTimer) clearTimeout(autoNextTimer);
            autoNextTimer = setTimeout(() => {
                if (answerLocked) moveToNextQuestion();
            }, 2500);
            return true;
        } else if (!isMatch && !answerLocked) {
            // Show visual feedback for wrong answer, but allow retry
            renderCurrentQuestion(false, userAnswer, expected);
            return false;
        }
        return false;
    }

    function startListening() {
        if (answerLocked) {
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '✅ Already scored! Click NEXT.';
                statusDiv.className = 'status good-status';
            }
            speakText("You already answered this question correctly. Click next to continue.");
            return;
        }
        
        if (!recognitionSupported) {
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '⚠️ Speech recognition not supported. Please use the text box below.';
                statusDiv.className = 'status bad-status';
            }
            speakText("Speech recognition not supported. Please use the text box to type your answer.");
            return;
        }
        
        if (!micPermissionGranted) {
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '🎤 Microphone not ready. Please use the text box below to type your answer.';
                statusDiv.className = 'status bad-status';
            }
            speakText("Microphone not ready. Please use the text box to type your answer.");
            return;
        }
        
        if (recognition) { try { recognition.abort(); } catch(e) {} }
        
        recognition = new SpeechRecognitionAPI();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        
        recognition.onstart = () => {
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.add('listening');
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = '🎙️ Listening... Speak your answer clearly!';
                statusDiv.className = 'status warning-status';
            }
        };
        
        recognition.onerror = (event) => {
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('listening');
            let errorMsg = '⚠️ Could not hear you. Try again or use the text box.';
            if (event.error === 'no-speech') errorMsg = '🔇 No speech detected. Click microphone again and speak clearly.';
            if (event.error === 'not-allowed') errorMsg = '🔇 Microphone access blocked. Please use the text box.';
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = errorMsg;
                statusDiv.className = 'status bad-status';
            }
            recognition = null;
        };
        
        recognition.onend = () => {
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('listening');
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const statusDiv = document.getElementById('dynamicStatus');
            if (statusDiv) {
                statusDiv.innerHTML = `🗣️ You said: "${transcript}"`;
                statusDiv.className = 'status warning-status';
            }
            checkAnswerAndAward(transcript);
            try { recognition.stop(); } catch(e) {}
            recognition = null;
            const micBtn = document.getElementById('micBtn');
            if (micBtn) micBtn.classList.remove('listening');
        };
        
        recognition.start();
    }

    function moveToNextQuestion() {
        if (!answerLocked) return;
        if (currentIndex + 1 < currentQuestions.length) {
            currentIndex++;
            answerLocked = false;
            renderCurrentQuestion();
        } else {
            renderCompletionScreen();
        }
    }

    function resetLevel() {
        if (autoNextTimer) clearTimeout(autoNextTimer);
        if (recognition) { try { recognition.abort(); } catch(e) {} recognition = null; }
        currentIndex = 0;
        currentScore = 0;
        answerLocked = false;
        updateTotalScoreUI();
        renderCurrentQuestion();
    }

    function renderCompletionScreen() {
        const totalQ = currentQuestions.length;
        const percentage = Math.round((currentScore / totalQ) * 100);
        let message = "";
        if (percentage >= 80) message = "🌟 Excellent! You're a Career Voice Champion! 🌟";
        else if (percentage >= 60) message = "👍 Good job! Keep practicing your career vocabulary!";
        else message = "📘 Keep speaking! Practice makes perfect for your future career!";
        
        quizMain.innerHTML = `
            <div class="quiz-complete">
                <h2>🎉 ${currentGrade} Career Voice Complete! 🎉</h2>
                <p style="margin: 1rem 0;"><strong>Your Score: ${currentScore} / ${totalQ}</strong></p>
                <p>${percentage}% - ${message}</p>
                <button id="resetGradeBtn" class="next-btn" style="background:#ffcd3c; margin-top:1rem;">🔄 Play Again</button>
                <button id="changeGradeBtn" class="next-btn" style="background:#e0e0e0; box-shadow:0 5px 0 #aaa;">📚 Change Grade</button>
            </div>
        `;
        document.getElementById('resetGradeBtn')?.addEventListener('click', () => resetLevel());
        document.getElementById('changeGradeBtn')?.addEventListener('click', () => {
            document.querySelector('.grade-selector-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderCurrentQuestion(isCorrectJustAwarded = false, wrongAnswer = null, expectedAnswer = null) {
        if (!currentQuestions.length || currentIndex >= currentQuestions.length) {
            if (currentQuestions.length > 0 && currentIndex >= currentQuestions.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="quiz-complete"><h2>💼 Select a grade to begin speaking!</h2><p>Choose your grade from the buttons above.</p></div>`;
            }
            return;
        }
        
        const q = currentQuestions[currentIndex];
        const promptText = q.prompt;
        const hintText = q.hint || "Speak clearly into your microphone.";
        const isAnswered = answerLocked;
        
        let statusHtml = '';
        let successMessageHtml = '';
        let wrongMessageHtml = '';
        
        if (isCorrectJustAwarded) {
            successMessageHtml = `
                <div class="success-message">
                    🎉✨ CORRECT! +1 POINT! ✨🎉
                </div>
            `;
            statusHtml = '<div id="dynamicStatus" class="status good-status">✅ Correct! Moving to next question...</div>';
        } else if (isAnswered) {
            statusHtml = '<div class="status good-status">✅ Already scored! Click next to continue.</div>';
        } else if (wrongAnswer) {
            wrongMessageHtml = `
                <div class="success-message" style="background:#ffe0db; color:#991b1b;">
                    ❌ Wrong answer! The correct answer is: "${expectedAnswer}". Keep trying!
                </div>
            `;
            statusHtml = '<div id="dynamicStatus" class="status bad-status">❌ Try again! Click microphone and speak the correct answer.</div>';
        } else {
            statusHtml = '<div id="dynamicStatus" class="status warning-status">Click speaker to listen, then microphone and speak your answer</div>';
        }
        
        quizMain.innerHTML = `
            <div class="progress-area">
                <div class="q-counter">💼 Question ${currentIndex+1} / ${currentQuestions.length}  |  ${currentGrade} Level</div>
            </div>
            <div class="question-card">
                <div class="hint-text">💡 Hint: ${hintText}</div>
                <div class="question-text">🎤 ${promptText}</div>
                <div class="voice-controls">
                    <button id="listenBtn" class="listen-btn" ${isAnswered ? 'disabled' : ''}>🔊 LISTEN</button>
                    <button id="micBtn" class="microphone-btn" ${isAnswered ? 'disabled' : ''}>🎙️ ${isAnswered ? 'ANSWERED' : 'SPEAK'}</button>
                </div>
                ${successMessageHtml}
                ${wrongMessageHtml}
                ${statusHtml}
            </div>
            <div class="text-input-area">
                <p>✏️ <strong>Type your answer (if microphone not working)</strong></p>
                <input type="text" id="textInput" class="text-input" placeholder="Type the answer here..." autocomplete="off" ${isAnswered ? 'disabled' : ''}>
                <button id="submitTextBtn" class="submit-btn" ${isAnswered ? 'disabled' : ''}>✓ CHECK ANSWER</button>
            </div>
            ${isAnswered ? `<button id="nextBtnAction" class="next-btn">➡ NEXT QUESTION ⬅</button>` : ''}
        `;
        
        const listenBtn = document.getElementById('listenBtn');
        if (listenBtn) listenBtn.addEventListener('click', () => speakText(promptText));
        
        const micBtn = document.getElementById('micBtn');
        if (micBtn && !isAnswered) micBtn.addEventListener('click', startListening);
        
        const submitBtn = document.getElementById('submitTextBtn');
        const textInput = document.getElementById('textInput');
        if (submitBtn && !isAnswered) {
            submitBtn.addEventListener('click', () => {
                const typedAnswer = textInput ? textInput.value : '';
                if (typedAnswer.trim() === '') {
                    const statusDiv = document.getElementById('dynamicStatus');
                    if (statusDiv) {
                        statusDiv.innerHTML = 'Please type an answer first!';
                        statusDiv.className = 'status bad-status';
                    }
                    speakText("Please type an answer before checking.");
                    return;
                }
                checkAnswerAndAward(typedAnswer);
                if (textInput) textInput.value = '';
                if (answerLocked) renderCurrentQuestion();
            });
        }
        if (textInput && !isAnswered) {
            textInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = textInput.value;
                    if (val.trim() !== '') {
                        checkAnswerAndAward(val);
                        textInput.value = '';
                        if (answerLocked) renderCurrentQuestion();
                    }
                }
            });
        }
        
        const nextBtn = document.getElementById('nextBtnAction');
        if (nextBtn) nextBtn.addEventListener('click', moveToNextQuestion);
    }

    function initMicrophone() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                micPermissionGranted = true;
                stream.getTracks().forEach(track => track.stop());
                const gradeInfo = document.getElementById('gradeInfoArea');
                if (gradeInfo && gradeInfo.innerHTML.includes('Select')) {
                    gradeInfo.innerHTML = '🎤 Microphone ready! Choose your grade and start speaking about careers!';
                }
                speakText("Microphone is ready! Click the microphone button to speak your answer.");
            })
            .catch(err => {
                micPermissionGranted = false;
                console.warn("Microphone permission denied", err);
                const gradeInfo = document.getElementById('gradeInfoArea');
                if (gradeInfo) {
                    gradeInfo.innerHTML = '🎤 Microphone access needed. Use the text box below to type answers.';
                }
            });
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
        initMicrophone();
    }

    initGame();
</script>
</body>
</html>
