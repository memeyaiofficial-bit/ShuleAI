    function shuffleAnswers(questionObj) {
        const optionsWithMeta = questionObj.options.map((optText, idx) => ({
            text: optText,
            isCorrect: (idx === questionObj.correct)
        }));
        for (let i = optionsWithMeta.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
        }
        const shuffledOptions = [];
        let newCorrectIndex = -1;
        optionsWithMeta.forEach((item, newIdx) => {
            shuffledOptions.push(item.text);
            if (item.isCorrect) newCorrectIndex = newIdx;
        });
        return {
            text: questionObj.text,
            hint: questionObj.hint,
            options: shuffledOptions,
            correct: newCorrectIndex
        };
    }

                { text: "What is a 'best seller'?", hint: "Sells many copies", options: ["A book that sells many copies", "The longest book", "The newest book", "A classic"], correct: 0 },
                { text: "What is a 'classic' book?", hint: "Timeless", options: ["A book of high quality that remains popular over time", "A new book", "A textbook", "A dictionary"], correct: 0 },
                { text: "What is a 'reading challenge'?", hint: "Goal", options: ["A goal to read a certain number of books", "A difficult book", "A test", "A library event"], correct: 0 }
            ]
        },
        "Grade 7": {
            name: "Grade 7",
            description: "Critical analysis and author's craft",
            questions: [
                { text: "What is author's purpose?", hint: "PIE (Persuade, Inform, Entertain)", options: ["Why the author wrote the text", "The title", "The length", "The genre"], correct: 0 },
                { text: "To persuade means to ____.", hint: "Convince", options: ["Convince the reader to agree", "Inform the reader", "Entertain the reader", "Describe something"], correct: 0 },
                { text: "To inform means to ____.", hint: "Teach facts", options: ["Give facts and information", "Tell a story", "Convince", "Describe"], correct: 0 },
                { text: "To entertain means to ____.", hint: "Amuse", options: ["Amuse or engage the reader", "Teach facts", "Persuade", "Describe"], correct: 0 },
                { text: "What is tone in literature?", hint: "Attitude", options: ["The author's attitude toward the subject", "The setting", "The characters", "The plot"], correct: 0 },
                { text: "What is mood in literature?", hint: "Feeling", options: ["The feeling the reader gets from the text", "The author's attitude", "The setting", "The plot"], correct: 0 },
                { text: "What is irony?", hint: "Opposite of expected", options: ["When the opposite of what is expected happens", "A funny joke", "A sad moment", "A happy ending"], correct: 0 },
                { text: "What is satire?", hint: "Humor to criticize", options: ["Using humor to criticize society", "A love story", "A mystery", "A biography"], correct: 0 },
                { text: "What is a motif?", hint: "Repeating element", options: ["A repeating element or theme in a work", "The main character", "The setting", "The title"], correct: 0 },
                { text: "What is an allusion?", hint: "Reference", options: ["A reference to another text or historical event", "A comparison", "An exaggeration", "A sound word"], correct: 0 },
                { text: "What is a graphic novel?", hint: "Comic book style", options: ["A novel that uses comic-style illustrations", "A novel with no pictures", "A textbook", "A dictionary"], correct: 0 },
                { text: "What is a 'page-turner'?", hint: "Hard to put down", options: ["An exciting book you can't stop reading", "A boring book", "A long book", "A short book"], correct: 0 }
            ]
        },
        "Grade 8": {
            name: "Grade 8",
            description: "Literary theory and advanced analysis",
            questions: [
                { text: "What is a protagonist?", hint: "Main character", options: ["The main character who drives the action", "The villain", "The narrator", "The author"], correct: 0 },
                { text: "What is an antagonist?", hint: "Opposes protagonist", options: ["The character or force opposing the protagonist", "The hero", "The narrator", "The setting"], correct: 0 },
                { text: "What is a foil?", hint: "Contrast character", options: ["A character who contrasts with another to highlight qualities", "The main character", "The villain", "The setting"], correct: 0 },
                { text: "What is a round character?", hint: "Complex", options: ["A complex, fully developed character", "A simple character", "A minor character", "The hero"], correct: 0 },
                { text: "What is a flat character?", hint: "Simple", options: ["A simple, one-dimensional character", "A complex character", "The main character", "The villain"], correct: 0 },
                { text: "What is a dynamic character?", hint: "Changes", options: ["A character who changes significantly", "A character who stays the same", "The main character", "The villain"], correct: 0 },
                { text: "What is a static character?", hint: "Doesn't change", options: ["A character who does not change", "A changing character", "The protagonist", "The antagonist"], correct: 0 },
                { text: "What is an unreliable narrator?", hint: "Not trustworthy", options: ["A narrator whose credibility is compromised", "A narrator who tells the truth", "The author", "The reader"], correct: 0 },
                { text: "What is stream of consciousness?", hint: "Flow of thoughts", options: ["A writing style that captures a character's thoughts", "A type of poem", "A chapter", "A title"], correct: 0 },
                { text: "What is magical realism?", hint: "Fantasy in real world", options: ["Fantasy elements in a realistic setting", "Pure fantasy", "Pure realism", "Science fiction"], correct: 0 },
                { text: "What is dystopian literature?", hint: "Bad future society", options: ["Literature about a flawed future society", "A perfect society", "A history book", "A biography"], correct: 0 },
                { text: "What is a bildungsroman?", hint: "Coming of age", options: ["A story about a character's growth from youth to adulthood", "A mystery", "A romance", "An adventure"], correct: 0 }
            ]
        },
        "Grade 9": {
            name: "Grade 9",
            description: "Critical theory and advanced literary concepts",
            questions: [
                { text: "What is literary criticism?", hint: "Analysis and interpretation", options: ["The study, analysis, and interpretation of literature", "Writing stories", "Reading quickly", "Memorizing poems"], correct: 0 },
                { text: "What is a close reading?", hint: "Detailed analysis", options: ["Detailed analysis of a short passage", "Reading quickly", "Skimming", "Summarizing"], correct: 0 },
                { text: "What is historical criticism?", hint: "Context-based", options: ["Analyzing literature through its historical context", "Analyzing grammar", "Analyzing characters", "Analyzing plot"], correct: 0 },
                { text: "What is feminist criticism?", hint: "Gender perspective", options: ["Analyzing literature from a gender perspective", "Analyzing only male authors", "Analyzing only female authors", "Analyzing plot"], correct: 0 },
                { text: "What is Marxist criticism?", hint: "Class perspective", options: ["Analyzing literature through class and economic power", "Analyzing through gender", "Analyzing through race", "Analyzing through psychology"], correct: 0 },
                { text: "What is postcolonial criticism?", hint: "Colonial impact", options: ["Analyzing literature about the effects of colonialism", "Analyzing only African literature", "Analyzing only European literature", "Analyzing grammar"], correct: 0 },
                { text: "What is a canon in literature?", hint: "Classic works", options: ["A collection of works considered classic or important", "A type of poem", "A novel", "A dictionary"], correct: 0 },
                { text: "What is intertextuality?", hint: "References between texts", options: ["The relationship between texts through references and influences", "A single text", "A genre", "A theme"], correct: 0 },
                { text: "What is deconstruction?", hint: "Challenge assumptions", options: ["A philosophy that challenges binary oppositions in texts", "Building a story", "Summarizing", "Predicting"], correct: 0 },
                { text: "What is an epigraph?", hint: "Opening quote", options: ["A quote at the beginning of a work", "The title", "The author's name", "The last sentence"], correct: 0 },
                { text: "What is an epilogue?", hint: "Concluding section", options: ["A concluding section at the end of a work", "The introduction", "The title page", "The cover"], correct: 0 },
                { text: "What is a prologue?", hint: "Introductory section", options: ["An introductory section before the main story", "The conclusion", "The epilogue", "The title"], correct: 0 },
                { text: "What is a soliloquy?", hint: "Character speaking alone", options: ["A speech where a character speaks their thoughts aloud alone", "Dialogue", "A letter", "A poem"], correct: 0 },
                { text: "What is an aside?", hint: "To audience", options: ["A remark by a character directed to the audience", "Dialogue", "A soliloquy", "A monologue"], correct: 0 },
                { text: "What is a tragic hero?", hint: "Noble with flaw", options: ["A noble character with a tragic flaw leading to downfall", "A perfect hero", "A villain", "A comic character"], correct: 0 }
            ]
        }
    };

    // Ensure each grade has at least 12 questions
    const gradeList = ["PP1", "PP2", "Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9"];
    
    for (let grade of gradeList) {
        if (gradeQuestions[grade] && gradeQuestions[grade].questions.length < 12) {
            const originalQs = [...gradeQuestions[grade].questions];
            while (gradeQuestions[grade].questions.length < 12) {
                gradeQuestions[grade].questions.push({ ...originalQs[gradeQuestions[grade].questions.length % originalQs.length] });
            }
        }
    }

    let currentGrade = "Grade 4";
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    let answerLocked = false;
    let selectedAnswerIndex = null;
    let questionResult = null;
    let currentShuffledQuestion = null;
    let totalQuestionsForGrade = 0;

    const quizMain = document.getElementById('quizMain');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = currentScore;
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function selectGrade(grade) {
        currentGrade = grade;
        const gradeData = gradeQuestions[grade];
        if (gradeData) {
            currentQuestions = [...gradeData.questions];
            totalQuestionsForGrade = currentQuestions.length;
            gradeInfoArea.innerHTML = `📚 ${gradeData.name}: ${gradeData.description} | ${totalQuestionsForGrade} questions`;
        } else {
            currentQuestions = [];
            totalQuestionsForGrade = 0;
            gradeInfoArea.innerHTML = `📚 ${grade}: Ready to read extensively!`;
        }
        
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderGradeButtons();
        renderCurrentQuestion();
    }

    function getShuffledCurrentQuestion() {
        if (!currentQuestions.length) return null;
        const originalQ = currentQuestions[currentQuestionIndex];
        if (!originalQ) return null;
        if (!currentShuffledQuestion) {
            currentShuffledQuestion = shuffleAnswers(originalQ);
        }
        return currentShuffledQuestion;
    }

    function handleAnswer(selectedIdx, correctIdx) {
        if (answerLocked) return;
        answerLocked = true;
        const isCorrect = (selectedIdx === correctIdx);
        if (isCorrect) {
            currentScore = Math.min(currentScore + 1, currentQuestions.length);
            updateTotalScoreUI();
            questionResult = 'correct';
        } else {
            questionResult = 'wrong';
        }
        selectedAnswerIndex = selectedIdx;
        renderCurrentQuestion();
    }

    function nextQuestion() {
        if (!answerLocked) return;
        if (currentQuestionIndex + 1 < currentQuestions.length) {
            currentQuestionIndex++;
            answerLocked = false;
            selectedAnswerIndex = null;
            questionResult = null;
            currentShuffledQuestion = null;
            renderCurrentQuestion();
        } else {
            renderCompletionScreen();
        }
    }

    function resetLevel() {
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderCurrentQuestion();
    }

    function renderCompletionScreen() {
        const totalQ = currentQuestions.length;
        const percentage = Math.round((currentScore / totalQ) * 100);
        let message = "";
        if (percentage >= 80) message = "🌟 Excellent! You're an Extensive Reading Champion! 🌟";
        else if (percentage >= 60) message = "👍 Good job! Keep reading widely to learn more!";
        else message = "📘 Keep reading! Every book makes you a better reader!";
        
        quizMain.innerHTML = `
            <div class="quiz-complete">
                <h2>🎉 ${currentGrade} Extensive Reading Complete! 🎉</h2>
                <p style="font-size:1.5rem; margin: 1rem 0;">📖 Your Score: ${currentScore} / ${totalQ}</p>
                <p style="font-size:1rem;">${percentage}% - ${message}</p>
                <button id="resetGradeBtn" class="next-btn" style="background:#ffcd3c; margin-top:1rem;">🔄 Play Again</button>
                <button id="changeGradeBtn" class="next-btn" style="background:#e0e0e0; box-shadow:0 6px 0 #aaa;">📚 Change Grade</button>
            </div>
        `;
        document.getElementById('resetGradeBtn')?.addEventListener('click', () => resetLevel());
        document.getElementById('changeGradeBtn')?.addEventListener('click', () => {
            document.querySelector('.grade-selector-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentQuestionIndex >= currentQuestions.length) {
            if (currentQuestions.length > 0 && currentQuestionIndex >= currentQuestions.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="quiz-complete"><h2>📚 Select a grade to start reading!</h2><p>Choose your grade from the buttons above to begin extensive reading practice.</p></div>`;
            }
            return;
        }
        
        const shuffledQ = getShuffledCurrentQuestion();
        if (!shuffledQ) return;
        const hintText = shuffledQ.hint || "Read widely — every book adds to your knowledge!";
        const isAnswered = answerLocked;
        const correctIdx = shuffledQ.correct;

        let answersHtml = '';
        shuffledQ.options.forEach((opt, idx) => {
            let additionalClass = '';
            let disabledAttr = isAnswered ? 'disabled-answer' : '';
            if (isAnswered && idx === correctIdx) additionalClass = 'correct-feedback';
            else if (isAnswered && idx === selectedAnswerIndex && idx !== correctIdx) additionalClass = 'wrong-feedback';
            answersHtml += `<div class="answer-card ${additionalClass} ${disabledAttr}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
        });
        
        const feedbackMsg = (questionResult === 'correct') ? '✅ Correct! +1 point ✅' : (questionResult === 'wrong' ? `❌ Oops! Correct answer: ${shuffledQ.options[correctIdx]} ❌` : '');
        
        quizMain.innerHTML = `
            <div class="progress-area">
                <div class="q-counter">📖 Question ${currentQuestionIndex+1} / ${currentQuestions.length}  |  ${currentGrade} Level</div>
                <div class="hint-box">💡 Hint: ${hintText}</div>
            </div>
            <div class="question-text">❓ ${shuffledQ.text}</div>
            <div class="answers-grid" id="answersGrid">
                ${answersHtml}
            </div>
            ${feedbackMsg ? `<div style="text-align:center; font-weight:600; margin: 0.5rem 0;">${feedbackMsg}</div>` : ''}
            ${isAnswered ? `<button id="nextBtnAction" class="next-btn">➡ Next Question ⬅</button>` : ''}
        `;
        
        if (!isAnswered) {
            document.querySelectorAll('.answer-card').forEach(div => {
                div.addEventListener('click', () => {
                    if (answerLocked) return;
                    const idx = parseInt(div.getAttribute('data-opt-index'));
                    handleAnswer(idx, correctIdx);
                });
            });
        } else {
            const nextBtnDom = document.getElementById('nextBtnAction');
            if (nextBtnDom) nextBtnDom.addEventListener('click', nextQuestion);
        }
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
    }

    initGame();
</script>
</body>
</html>
