    function shuffleAnswers(questionObj) {
        const optionsWithMeta = questionObj.options.map((optText, idx) => ({
            text: optText,
            isCorrect: (idx === questionObj.correct)
        }));
        for (let i = optionsWithMeta.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
        }
        const shuffledOptions = [];
        let newCorrectIndex = -1;
        optionsWithMeta.forEach((item, newIdx) => {
            shuffledOptions.push(item.text);
            if (item.isCorrect) newCorrectIndex = newIdx;
        });
        return {
            text: questionObj.text,
            hint: questionObj.hint,
            passage: questionObj.passage || null,
            options: shuffledOptions,
            correct: newCorrectIndex
        };
    }

                { text: "What is the likely long-term impact on flamingos if water levels keep rising?", hint: "Habitat loss", options: ["They may have to relocate or decline in numbers", "They will learn to swim better", "More flamingos will be born", "Nothing will happen"], correct: 0 }
            ]
        },
        "Grade 9": {
            name: "Grade 9",
            description: "Advanced analysis, synthesis, evaluation",
            questions: [
                { text: "What is the central argument of this passage?", hint: "Main claim", options: ["The Great Rift Valley is a geological wonder that has shaped Kenya's landscape and wildlife", "The Great Rift Valley is only good for farming", "The Rift Valley was formed by volcanoes", "The Rift Valley is dangerous"], correct: 0, passage: "🌋 The Great Rift Valley was formed millions of years ago by tectonic plate movements. This geological feature stretches from Syria to Mozambique. In Kenya, it contains beautiful lakes like Lake Nakuru, famous for its millions of flamingos, and Lake Bogoria with its hot springs. The valley has also revealed important fossil discoveries that help us understand human evolution." },
                { text: "What evidence does the author use to support the importance of the Rift Valley?", hint: "Examples given", options: ["Lakes, flamingos, hot springs, and fossils", "Only the lakes", "Only the fossils", "Only the hot springs"], correct: 0, passage: "🌋 The Great Rift Valley was formed millions of years ago by tectonic plate movements. This geological feature stretches from Syria to Mozambique. In Kenya, it contains beautiful lakes like Lake Nakuru, famous for its millions of flamingos, and Lake Bogoria with its hot springs. The valley has also revealed important fossil discoveries that help us understand human evolution." },
                { text: "The passage implies that the Great Rift Valley is valuable for ____.", hint: "Multiple benefits", options: ["scientific, ecological, and economic reasons", "only tourism", "only farming", "only mining"], correct: 0 }
            ]
        }
    };

    // Ensure each grade has at least 10 questions (pad if needed)
    const gradeList = ["PP1", "PP2", "Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9"];
    
    // Pad any grade with fewer than 12 questions by duplicating
    for (let grade of gradeList) {
        if (gradeQuestions[grade] && gradeQuestions[grade].questions.length < 12) {
            const originalQs = [...gradeQuestions[grade].questions];
            while (gradeQuestions[grade].questions.length < 12) {
                gradeQuestions[grade].questions.push({ ...originalQs[gradeQuestions[grade].questions.length % originalQs.length] });
            }
        }
    }

    let currentGrade = "Grade 4";
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let currentScore = 0;
    let answerLocked = false;
    let selectedAnswerIndex = null;
    let questionResult = null;
    let currentShuffledQuestion = null;
    let totalQuestionsForGrade = 0;

    const quizMain = document.getElementById('quizMain');
    const gradeButtonsContainer = document.getElementById('gradeButtonsContainer');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const gradeInfoArea = document.getElementById('gradeInfoArea');

    function updateTotalScoreUI() {
        totalScoreSpan.innerText = currentScore;
    }

    function renderGradeButtons() {
        gradeButtonsContainer.innerHTML = '';
        gradeList.forEach(grade => {
            const btn = document.createElement('button');
            btn.className = `grade-btn ${currentGrade === grade ? 'active' : ''}`;
            btn.innerText = grade;
            btn.onclick = () => {
                if (!answerLocked || confirm("Changing grade will reset your progress. Continue?")) {
                    selectGrade(grade);
                }
            };
            gradeButtonsContainer.appendChild(btn);
        });
    }

    function selectGrade(grade) {
        currentGrade = grade;
        const gradeData = gradeQuestions[grade];
        if (gradeData) {
            currentQuestions = [...gradeData.questions];
            totalQuestionsForGrade = currentQuestions.length;
            gradeInfoArea.innerHTML = `📚 ${gradeData.name}: ${gradeData.description} | ${totalQuestionsForGrade} questions`;
        } else {
            currentQuestions = [];
            totalQuestionsForGrade = 0;
            gradeInfoArea.innerHTML = `📚 ${grade}: Ready for intensive reading!`;
        }
        
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderGradeButtons();
        renderCurrentQuestion();
    }

    function getShuffledCurrentQuestion() {
        if (!currentQuestions.length) return null;
        const originalQ = currentQuestions[currentQuestionIndex];
        if (!originalQ) return null;
        if (!currentShuffledQuestion) {
            currentShuffledQuestion = shuffleAnswers(originalQ);
        }
        return currentShuffledQuestion;
    }

    function handleAnswer(selectedIdx, correctIdx) {
        if (answerLocked) return;
        answerLocked = true;
        const isCorrect = (selectedIdx === correctIdx);
        if (isCorrect) {
            currentScore++;
            updateTotalScoreUI();
            questionResult = 'correct';
        } else {
            questionResult = 'wrong';
        }
        selectedAnswerIndex = selectedIdx;
        renderCurrentQuestion();
    }

    function nextQuestion() {
        if (!answerLocked) return;
        if (currentQuestionIndex + 1 < currentQuestions.length) {
            currentQuestionIndex++;
            answerLocked = false;
            selectedAnswerIndex = null;
            questionResult = null;
            currentShuffledQuestion = null;
            renderCurrentQuestion();
        } else {
            renderCompletionScreen();
        }
    }

    function resetLevel() {
        currentQuestionIndex = 0;
        currentScore = 0;
        answerLocked = false;
        selectedAnswerIndex = null;
        questionResult = null;
        currentShuffledQuestion = null;
        updateTotalScoreUI();
        renderCurrentQuestion();
    }

    function renderCompletionScreen() {
        const totalQ = currentQuestions.length;
        const percentage = Math.round((currentScore / totalQ) * 100);
        let message = "";
        if (percentage >= 80) message = "🌟 Excellent! You're a Reading Champion! 🌟";
        else if (percentage >= 60) message = "👍 Good job! Keep practicing to become a reading expert!";
        else message = "📘 Keep reading! Try again to improve your comprehension skills!";
        
        quizMain.innerHTML = `
            <div class="quiz-complete">
                <h2>🎉 ${currentGrade} Intensive Reading Complete! 🎉</h2>
                <p style="font-size:1.5rem; margin: 1rem 0;">📊 Your Score: ${currentScore} / ${totalQ}</p>
                <p style="font-size:1rem;">${percentage}% - ${message}</p>
                <button id="resetGradeBtn" class="next-btn" style="background:#ffcd3c; margin-top:1rem;">🔄 Play Again</button>
                <button id="changeGradeBtn" class="next-btn reset-btn" style="background:#e0e0e0; box-shadow:0 6px 0 #aaa;">📚 Change Grade</button>
            </div>
        `;
        document.getElementById('resetGradeBtn')?.addEventListener('click', () => resetLevel());
        document.getElementById('changeGradeBtn')?.addEventListener('click', () => {
            document.querySelector('.grade-selector-area').scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentQuestionIndex >= currentQuestions.length) {
            if (currentQuestions.length > 0 && currentQuestionIndex >= currentQuestions.length) {
                renderCompletionScreen();
            } else {
                quizMain.innerHTML = `<div class="quiz-complete"><h2>📚 Select a grade to start reading!</h2><p>Choose your grade from the buttons above to begin intensive reading practice.</p></div>`;
            }
            return;
        }
        
        const shuffledQ = getShuffledCurrentQuestion();
        if (!shuffledQ) return;
        const hintText = shuffledQ.hint || "Read the passage carefully before answering.";
        const isAnswered = answerLocked;
        const correctIdx = shuffledQ.correct;
        const passageHtml = shuffledQ.passage ? `<div class="passage-box">📖 ${shuffledQ.passage}</div>` : '';

        let answersHtml = '';
        shuffledQ.options.forEach((opt, idx) => {
            let additionalClass = '';
            let disabledAttr = isAnswered ? 'disabled-answer' : '';
            if (isAnswered && idx === correctIdx) additionalClass = 'correct-feedback';
            else if (isAnswered && idx === selectedAnswerIndex && idx !== correctIdx) additionalClass = 'wrong-feedback';
            answersHtml += `<div class="answer-card ${additionalClass} ${disabledAttr}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
        });
        
        const feedbackMsg = (questionResult === 'correct') ? '✅ Correct! +1 point ✅' : (questionResult === 'wrong' ? `❌ Oops! Correct answer: ${shuffledQ.options[correctIdx]} ❌` : '');
        
        quizMain.innerHTML = `
            <div class="progress-area">
                <div class="q-counter">📖 Question ${currentQuestionIndex+1} / ${currentQuestions.length}  |  ${currentGrade} Level</div>
                <div class="hint-box">💡 Hint: ${hintText}</div>
            </div>
            ${passageHtml}
            <div class="question-text">❓ ${shuffledQ.text}</div>
            <div class="answers-grid" id="answersGrid">
                ${answersHtml}
            </div>
            ${feedbackMsg ? `<div style="text-align:center; font-weight:600; margin: 0.5rem 0;">${feedbackMsg}</div>` : ''}
            ${isAnswered ? `<button id="nextBtnAction" class="next-btn">➡ Next Question ⬅</button>` : ''}
        `;
        
        if (!isAnswered) {
            document.querySelectorAll('.answer-card').forEach(div => {
                div.addEventListener('click', () => {
                    if (answerLocked) return;
                    const idx = parseInt(div.getAttribute('data-opt-index'));
                    handleAnswer(idx, correctIdx);
                });
            });
        } else {
            const nextBtnDom = document.getElementById('nextBtnAction');
            if (nextBtnDom) nextBtnDom.addEventListener('click', nextQuestion);
        }
    }

    function initGame() {
        renderGradeButtons();
        selectGrade("Grade 4");
    }

    initGame();
</script>
</body>
</html>
